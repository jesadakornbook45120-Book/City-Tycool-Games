<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏙️ City Tycool - สร้างเมืองรวย!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
  :root{--orange:#FF7A00;--panel:rgba(255,255,255,0.97);--shadow:0 4px 20px rgba(0,0,0,0.2);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Nunito',sans-serif;background:#87CEEB;overflow:hidden;height:100vh;user-select:none;}
  #game-container{width:100vw;height:100vh;position:relative;overflow:hidden;}
  #sky-bg{position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(180deg,#6BB8E8,#ADE4FF);z-index:0;}
  .cloud{position:absolute;background:white;border-radius:50px;opacity:0.85;animation:floatCloud linear infinite;}
  @keyframes floatCloud{from{transform:translateX(-200px)}to{transform:translateX(110vw)}}
  #ground{position:absolute;bottom:0;left:0;right:0;height:62%;background:linear-gradient(180deg,#7BC47F,#5DBB63 30%,#4CAF50);z-index:1;}
  #road{position:absolute;bottom:120px;left:0;right:0;height:60px;background:#7B7B7B;z-index:3;}
  #road::before{content:'';position:absolute;top:50%;left:0;right:0;height:4px;background:repeating-linear-gradient(90deg,#FFD700 0,#FFD700 40px,transparent 40px,transparent 80px);transform:translateY(-50%);}
  #city-area{position:absolute;bottom:180px;left:0;right:0;height:300px;z-index:2;display:flex;align-items:flex-end;padding:0 20px;gap:12px;}
  .building-slot{position:relative;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform 0.2s;}
  .building-slot:hover{transform:scale(1.05);}
  .building{position:relative;border-radius:8px 8px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:4px;}
  .building-windows{position:absolute;top:10px;left:6px;right:6px;display:grid;grid-template-columns:repeat(2,1fr);gap:4px;}
  .window{background:rgba(255,255,255,0.7);border-radius:2px;height:8px;}
  .window.lit{background:#FFE066;}
  .building-label{font-family:'Fredoka One',cursive;font-size:11px;color:white;text-shadow:1px 1px 2px rgba(0,0,0,0.5);margin-top:4px;text-align:center;line-height:1.2;}
  .build-btn{background:linear-gradient(135deg,#44BB44,#2E8B2E);border:3px solid #1A5C1A;border-radius:12px;padding:6px 12px;color:white;font-family:'Fredoka One',cursive;font-size:12px;cursor:pointer;box-shadow:0 4px 0 #1A5C1A;transition:all 0.1s;white-space:nowrap;}
  .build-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #1A5C1A;}
  .build-btn:disabled{background:linear-gradient(135deg,#999,#666);border-color:#444;box-shadow:0 4px 0 #444;cursor:not-allowed;}
  #trucks-layer{position:absolute;bottom:120px;left:0;right:0;height:60px;z-index:10;pointer-events:none;}
  .truck{position:absolute;font-size:28px;bottom:8px;animation:driveTruck linear;filter:drop-shadow(2px 2px 2px rgba(0,0,0,0.3));}
  @keyframes driveTruck{0%{left:-80px}100%{left:110%}}
  .float-coin{position:absolute;font-size:18px;pointer-events:none;animation:floatUp 1s ease-out forwards;z-index:100;}
  @keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-80px) scale(1.3);opacity:0}}
  #hud{position:fixed;top:0;left:0;right:0;z-index:50;padding:10px 16px;display:flex;gap:10px;align-items:center;background:linear-gradient(180deg,rgba(0,0,0,0.4),transparent);}
  .hud-box{background:var(--panel);border-radius:20px;padding:6px 14px;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow);border:2px solid rgba(255,255,255,0.8);}
  .hud-icon{font-size:20px;}
  .hud-value{font-family:'Fredoka One',cursive;font-size:18px;color:#333;min-width:60px;}
  .hud-label{font-size:11px;color:#888;font-weight:700;}
  #bottom-panel{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--panel);border-radius:20px 20px 0 0;padding:12px 16px;box-shadow:0 -4px 20px rgba(0,0,0,0.15);max-height:180px;overflow-y:auto;}
  #bottom-panel h3{font-family:'Fredoka One',cursive;font-size:16px;color:#333;margin-bottom:10px;}
  .shop-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .shop-item{background:linear-gradient(135deg,#f8f9ff,#eef0ff);border:2px solid #dde0ff;border-radius:14px;padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:all 0.15s;}
  .shop-item:hover{transform:scale(1.02);border-color:#9966FF;}
  .shop-item.cant-afford{opacity:0.5;cursor:not-allowed;}
  .shop-emoji{font-size:26px;}
  .shop-info{flex:1;}
  .shop-name{font-family:'Fredoka One',cursive;font-size:13px;color:#333;}
  .shop-desc{font-size:10px;color:#888;}
  .shop-price{font-family:'Fredoka One',cursive;font-size:13px;color:var(--orange);}
  .level-notif{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:linear-gradient(135deg,#FFD700,#FF8C00);border-radius:20px;padding:20px 40px;font-family:'Fredoka One',cursive;font-size:24px;color:white;text-shadow:2px 2px 4px rgba(0,0,0,0.3);z-index:200;box-shadow:0 10px 40px rgba(255,140,0,0.5);animation:popIn 2s ease forwards;text-align:center;pointer-events:none;}
  @keyframes popIn{0%{transform:translate(-50%,-50%) scale(0) rotate(-5deg);opacity:0}20%{transform:translate(-50%,-50%) scale(1.1) rotate(2deg);opacity:1}30%{transform:translate(-50%,-50%) scale(1) rotate(0)}70%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(0.8);opacity:0}}
  #income-ticker{position:fixed;top:70px;right:16px;background:rgba(0,0,0,0.5);color:#FFD700;font-family:'Fredoka One',cursive;font-size:13px;padding:4px 10px;border-radius:20px;z-index:50;}
  .sparkle{position:absolute;font-size:16px;pointer-events:none;animation:sparkleAnim 0.8s ease-out forwards;z-index:100;}
  @keyframes sparkleAnim{0%{transform:translate(0,0) scale(0);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(1);opacity:0}}
  #login-overlay{position:fixed;inset:0;z-index:999;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
  #login-overlay h1{font-family:'Fredoka One',cursive;font-size:42px;color:#FFD700;text-shadow:0 4px 20px rgba(255,215,0,0.5);}
  #google-login-btn{background:white;border:none;border-radius:16px;padding:14px 28px;font-family:'Fredoka One',cursive;font-size:18px;color:#333;cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:0 8px 30px rgba(0,0,0,0.3);transition:all 0.2s;}
  #google-login-btn:hover{transform:scale(1.05);}
  #user-bar{position:fixed;top:8px;right:12px;z-index:60;display:none;align-items:center;gap:8px;}
  #user-avatar{width:32px;height:32px;border-radius:50%;border:2px solid white;}
  #user-name{font-family:'Fredoka One',cursive;font-size:13px;color:white;text-shadow:1px 1px 3px rgba(0,0,0,0.5);}
  #logout-btn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:10px;padding:3px 8px;color:white;font-size:11px;cursor:pointer;}
  #save-indicator{position:fixed;bottom:190px;right:16px;background:rgba(0,180,0,0.85);color:white;font-family:'Fredoka One',cursive;font-size:12px;padding:4px 12px;border-radius:20px;z-index:60;display:none;}
</style>
</head>
<body>

<div id="login-overlay">
  <div style="font-size:70px">🏙️</div>
  <h1>City Tycool</h1>
  <p style="color:#aaa;font-size:16px">สร้างเมือง สะสมความรวย!</p>
  <button id="google-login-btn">
    <img src="https://www.google.com/favicon.ico" style="width:24px" alt="G">
    เข้าสู่ระบบด้วย Google
  </button>
  <p style="font-size:12px;color:#555">เซฟข้อมูลอัตโนมัติ ✨</p>
</div>

<div id="user-bar">
  <img id="user-avatar" src="" alt="">
  <span id="user-name"></span>
  <button id="logout-btn">ออก</button>
</div>
<div id="save-indicator">💾 บันทึกแล้ว!</div>

<div id="game-container">
  <div id="sky-bg"></div>
  <div id="ground"></div>
  <div id="road"></div>
  <div id="city-area"></div>
  <div id="trucks-layer"></div>
</div>

<div id="hud">
  <div class="hud-box">
    <span class="hud-icon">💰</span>
    <div><div class="hud-value" id="money-display">0</div><div class="hud-label">เหรียญ</div></div>
  </div>
  <div class="hud-box">
    <span class="hud-icon">⭐</span>
    <div><div class="hud-value" id="level-display">1</div><div class="hud-label">เลเวล</div></div>
  </div>
  <div class="hud-box" style="flex:1">
    <span class="hud-icon">📈</span>
    <div style="flex:1">
      <div style="font-size:11px;color:#888;font-weight:700">EXP สู่เลเวลถัดไป</div>
      <div style="background:#eee;border-radius:10px;height:8px;margin-top:2px;overflow:hidden">
        <div id="exp-bar" style="background:linear-gradient(90deg,#9966FF,#FF66CC);height:100%;width:0%;border-radius:10px;transition:width 0.3s"></div>
      </div>
    </div>
  </div>
</div>
<div id="income-ticker">+0 💰/วิ</div>
<div id="bottom-panel">
  <h3>🏗️ สร้าง / อัพเกรด</h3>
  <div class="shop-grid" id="shop-grid"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ===== FIREBASE INIT =====
const firebaseConfig = {
  apiKey: "AIzaSyASRB9Ved_Va_OoAXIpc1glavQ-cMmAs74",
  authDomain: "book-classic.firebaseapp.com",
  projectId: "book-classic",
  storageBucket: "book-classic.firebasestorage.app",
  messagingSenderId: "402719934660",
  appId: "1:402719934660:web:b59916175365e60637a191"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

let currentUser = null;
let saveTimeout = null;
let gameStarted = false;

// ===== AUTH BUTTONS =====
document.getElementById('google-login-btn').addEventListener('click', () => {
  auth.signInWithPopup(provider).catch(e => alert('Login ไม่สำเร็จ: ' + e.message));
});
document.getElementById('logout-btn').addEventListener('click', () => {
  auth.signOut().then(() => location.reload());
});

auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('user-bar').style.display = 'flex';
    document.getElementById('user-avatar').src = user.photoURL || '';
    document.getElementById('user-name').textContent = user.displayName?.split(' ')[0] || 'ผู้เล่น';
    if (!gameStarted) { await loadGame(); startGame(); gameStarted = true; }
  } else {
    document.getElementById('login-overlay').style.display = 'flex';
  }
});

// ===== SAVE / LOAD =====
async function saveGame() {
  if (!currentUser) return;
  try {
    await db.collection('saves').doc(currentUser.uid).set({
      money: state.money, exp: state.exp, level: state.level,
      buildings: state.buildings, savedAt: new Date().toISOString()
    });
    const ind = document.getElementById('save-indicator');
    ind.style.display = 'block';
    setTimeout(() => ind.style.display = 'none', 2000);
  } catch(e) { console.error('Save error:', e); }
}

async function loadGame() {
  if (!currentUser) return;
  try {
    const snap = await db.collection('saves').doc(currentUser.uid).get();
    if (snap.exists) {
      const d = snap.data();
      state.money = d.money || 50;
      state.exp = d.exp || 0;
      state.level = d.level || 1;
      state.buildings = d.buildings || [];
      showLevelNotif('🔄 โหลดข้อมูลแล้ว!');
    }
  } catch(e) { console.error('Load error:', e); }
}

function scheduleSave() {
  if (saveTimeout) clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveGame, 3000);
}

// ===== GAME STATE =====
const state = { money:50, exp:0, level:1, buildings:[], incomePerSec:0, lastTick:Date.now() };
const MAX_BUILDINGS = 8;
const BUILDING_TYPES = [
  {id:'warehouse',name:'🏭 โกดัง',emoji:'🏭',baseCost:30,incomeBase:2,color:'#FF8C42',truckInterval:4000,truckEmoji:'🚛',desc:'ผลิตสินค้าส่งออก',maxLevel:10},
  {id:'shop',name:'🏪 ร้านค้า',emoji:'🏪',baseCost:80,incomeBase:5,color:'#42A5F5',truckInterval:6000,truckEmoji:'🚐',desc:'ขายของให้ลูกค้า',maxLevel:10},
  {id:'factory',name:'🏗️ โรงงาน',emoji:'🏗️',baseCost:200,incomeBase:12,color:'#AB47BC',truckInterval:8000,truckEmoji:'🚚',desc:'ผลิตสินค้าหนัก',maxLevel:10},
  {id:'bank',name:'🏦 ธนาคาร',emoji:'🏦',baseCost:500,incomeBase:30,color:'#DAA520',truckInterval:10000,truckEmoji:'🚌',desc:'สร้างรายได้ passive',maxLevel:10},
];
const EXP_PER_LEVEL = [0,100,250,500,900,1500,2500,4000,6500,10000,16000];

const getIncome = (t,l) => Math.floor(t.incomeBase * Math.pow(1.4,l-1));
const getUpgradeCost = (t,l) => Math.floor(t.baseCost * Math.pow(1.6,l));
const formatNum = n => n>=1e6?(n/1e6).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'K':Math.floor(n).toString();
const calcIPS = () => state.buildings.reduce((s,b)=>{const t=BUILDING_TYPES.find(x=>x.id===b.type);return s+(t?getIncome(t,b.level):0);},0);

function addExp(amt) {
  state.exp += amt;
  const needed = EXP_PER_LEVEL[state.level]||99999;
  if (state.exp >= needed && state.level < 10) {
    state.level++; state.exp -= needed;
    showLevelNotif(`🎉 เลเวล ${state.level}! ยอดเยี่ยม!`);
  }
}

function updateHUD() {
  document.getElementById('money-display').textContent = formatNum(state.money);
  document.getElementById('level-display').textContent = state.level;
  const needed = EXP_PER_LEVEL[state.level]||1;
  document.getElementById('exp-bar').style.width = Math.min(100,(state.exp/needed)*100)+'%';
  state.incomePerSec = calcIPS();
  document.getElementById('income-ticker').textContent = `+${formatNum(state.incomePerSec)} 💰/วิ`;
}

function renderBuildings() {
  const area = document.getElementById('city-area');
  area.innerHTML = '';
  state.buildings.forEach((b,idx) => {
    const type = BUILDING_TYPES.find(t=>t.id===b.type);
    if (!type) return;
    const h=80+b.level*15, w=70+b.level*4;
    const slot = document.createElement('div');
    slot.className='building-slot'; slot.id=`building-${idx}`;
    const body = document.createElement('div'); body.className='building';
    body.style.cssText=`width:${w}px;height:${h}px;background:linear-gradient(170deg,${type.color}EE,${type.color}88);border:3px solid ${type.color};box-shadow:4px 4px 0 rgba(0,0,0,0.2),inset 0 2px 0 rgba(255,255,255,0.3);`;
    const roof=document.createElement('div');
    roof.style.cssText=`position:absolute;top:-18px;left:-4px;right:-4px;height:22px;background:${type.color};border-radius:6px 6px 0 0;`;
    body.appendChild(roof);
    const wins=document.createElement('div'); wins.className='building-windows';
    const wc=Math.min(2+b.level,8); wins.style.gridTemplateColumns=`repeat(${Math.min(wc,2)},1fr)`;
    for(let i=0;i<wc;i++){const w2=document.createElement('div');w2.className='window'+(Math.random()>0.3?' lit':'');wins.appendChild(w2);}
    body.appendChild(wins);
    const em=document.createElement('div'); em.style.cssText='font-size:22px;position:relative;z-index:2;'; em.textContent=type.emoji;
    body.appendChild(em); slot.appendChild(body);
    const badge=document.createElement('div');
    badge.style.cssText='position:absolute;top:-10px;right:-8px;background:#FFD700;border:2px solid #FF8C00;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:800;color:#333;font-family:"Fredoka One",cursive;';
    badge.textContent=`+${getIncome(type,b.level)}/s`; slot.appendChild(badge);
    const label=document.createElement('div'); label.className='building-label';
    label.innerHTML=`${type.name}<br>Lv.${b.level}`; slot.appendChild(label);
    if(b.level<type.maxLevel){
      const uc=getUpgradeCost(type,b.level);
      const btn=document.createElement('button'); btn.className='build-btn'; btn.style.marginTop='4px';
      btn.textContent=`⬆️ ${formatNum(uc)}💰`; btn.disabled=state.money<uc;
      btn.onclick=(e)=>{e.stopPropagation();upgradeBuilding(idx);};
      slot.appendChild(btn);
    } else {
      const ml=document.createElement('div');
      ml.style.cssText='font-family:"Fredoka One",cursive;font-size:11px;color:#FFD700;margin-top:4px;';
      ml.textContent='✨ MAX!'; slot.appendChild(ml);
    }
    area.appendChild(slot);
  });
  if(state.buildings.length<MAX_BUILDINGS){
    const e=document.createElement('div');
    e.style.cssText='width:70px;height:80px;border:3px dashed #aaa;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:30px;opacity:0.4;align-self:flex-end;';
    e.textContent='+'; area.appendChild(e);
  }
}

function renderShop() {
  const grid=document.getElementById('shop-grid'); grid.innerHTML='';
  BUILDING_TYPES.forEach(type=>{
    const own=state.buildings.filter(b=>b.type===type.id).length;
    const cost=Math.floor(type.baseCost*Math.pow(1.5,own));
    const canAfford=state.money>=cost, maxed=state.buildings.length>=MAX_BUILDINGS;
    const item=document.createElement('div');
    item.className='shop-item'+((!canAfford||maxed)?' cant-afford':'');
    item.innerHTML=`<div class="shop-emoji">${type.emoji}</div><div class="shop-info"><div class="shop-name">${type.name}</div><div class="shop-desc">${type.desc}</div></div><div class="shop-price">${formatNum(cost)}💰</div>`;
    item.onclick=()=>{if(canAfford&&!maxed)buyBuilding(type);};
    grid.appendChild(item);
  });
}

function buyBuilding(type) {
  const own=state.buildings.filter(b=>b.type===type.id).length;
  const cost=Math.floor(type.baseCost*Math.pow(1.5,own));
  if(state.money<cost||state.buildings.length>=MAX_BUILDINGS) return;
  state.money-=cost; state.buildings.push({type:type.id,level:1}); addExp(20);
  renderBuildings(); renderShop(); updateHUD();
  startBuildingTruck(state.buildings.length-1);
  showLevelNotif(`🏗️ สร้าง ${type.name}!`); scheduleSave();
}

function upgradeBuilding(idx) {
  const b=state.buildings[idx];
  const type=BUILDING_TYPES.find(t=>t.id===b.type);
  const cost=getUpgradeCost(type,b.level);
  if(state.money<cost||b.level>=type.maxLevel) return;
  state.money-=cost; b.level++; addExp(30+b.level*10);
  const el=document.getElementById(`building-${idx}`); if(el) spawnSparklesAt(el);
  renderBuildings(); renderShop(); updateHUD();
  showLevelNotif(`⬆️ ${type.name} Lv.${b.level}!`); scheduleSave();
}

function startBuildingTruck(idx) {
  const b=state.buildings[idx]; if(!b) return;
  const type=BUILDING_TYPES.find(t=>t.id===b.type);
  function sendTruck() {
    if(!state.buildings[idx]) return;
    const layer=document.getElementById('trucks-layer');
    const truck=document.createElement('div'); truck.className='truck'; truck.textContent=type.truckEmoji;
    const dur=3+Math.random()*2; truck.style.animationDuration=dur+'s'; truck.style.bottom=(8+Math.random()*20)+'px';
    layer.appendChild(truck);
    setTimeout(()=>{
      const income=getIncome(type,state.buildings[idx]?.level||1);
      state.money+=income; addExp(2);
      const coin=document.createElement('div'); coin.className='float-coin';
      coin.textContent=`+${income}💰`; coin.style.left='45%'; coin.style.top='45%';
      document.getElementById('game-container').appendChild(coin);
      setTimeout(()=>coin.remove(),1000);
      updateHUD(); renderShop(); renderBuildings();
    }, dur*500);
    setTimeout(()=>truck.remove(),dur*1000+200);
    if(state.buildings[idx]) setTimeout(sendTruck, type.truckInterval/state.buildings[idx].level);
  }
  setTimeout(sendTruck,500+Math.random()*2000);
}

function spawnSparklesAt(el) {
  const r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(let i=0;i<6;i++){
    const s=document.createElement('div'); s.className='sparkle';
    const a=(i/6)*Math.PI*2,d=50+Math.random()*30;
    s.style.cssText=`left:${cx}px;top:${cy}px;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;`;
    s.textContent=['⭐','✨','💫'][Math.floor(Math.random()*3)];
    document.body.appendChild(s); setTimeout(()=>s.remove(),800);
  }
}

let notifT;
function showLevelNotif(text) {
  document.querySelector('.level-notif')?.remove();
  if(notifT) clearTimeout(notifT);
  const n=document.createElement('div'); n.className='level-notif'; n.textContent=text;
  document.body.appendChild(n); notifT=setTimeout(()=>n.remove(),2000);
}

function gameTick() {
  const now=Date.now(),dt=(now-state.lastTick)/1000; state.lastTick=now;
  state.money+=state.incomePerSec*dt*0.3;
  updateHUD(); renderShop();
}

// Clouds
for(let i=0;i<5;i++){
  const c=document.createElement('div'); c.className='cloud';
  const h=20+Math.random()*30,w=60+Math.random()*80;
  c.style.cssText=`width:${w}px;height:${h}px;top:${5+Math.random()*20}%;animation-duration:${25+Math.random()*30}s;animation-delay:${-Math.random()*30}s;`;
  document.getElementById('sky-bg').appendChild(c);
}

function startGame() {
  if(state.buildings.length===0) state.buildings.push({type:'warehouse',level:1});
  state.buildings.forEach((_,i)=>startBuildingTruck(i));
  renderBuildings(); renderShop(); updateHUD();
  setInterval(gameTick,500);
  setInterval(renderShop,1000);
  setInterval(saveGame,30000);
}
</script>
</body>
</html>
