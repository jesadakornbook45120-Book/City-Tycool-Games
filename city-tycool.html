<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏙️ City Tycool</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;overflow:hidden;height:100vh;user-select:none;background:#87CEEB;}

/* BG */
#sky{position:fixed;top:0;left:0;right:0;height:30%;z-index:0;background:linear-gradient(180deg,#5BA3D9,#ADE4FF);transition:background 1s;}
#gnd{position:fixed;bottom:0;left:0;right:0;height:70%;z-index:0;background:linear-gradient(180deg,#7BC47F,#5DBB63 30%,#4CAF50);transition:background 1s;}
#road{position:fixed;bottom:145px;left:0;right:0;height:46px;z-index:2;background:#7B7B7B;transition:background 1s;}
#road::before{content:'';position:absolute;top:50%;left:0;right:0;height:4px;background:repeating-linear-gradient(90deg,#FFD700 0,#FFD700 40px,transparent 40px,transparent 80px);transform:translateY(-50%);}
.cloud{position:fixed;background:white;border-radius:50px;opacity:0.75;z-index:1;animation:cloudMove linear infinite;}
@keyframes cloudMove{from{transform:translateX(-250px)}to{transform:translateX(110vw)}}

/* TRUCKS */
#truckLayer{position:fixed;bottom:145px;left:0;right:0;height:46px;z-index:3;pointer-events:none;}
.truck{position:absolute;font-size:22px;bottom:4px;animation:truckDrive linear;filter:drop-shadow(2px 2px 2px rgba(0,0,0,0.3));}
@keyframes truckDrive{0%{left:-70px}100%{left:108%}}
.coinPop{position:fixed;font-size:13px;pointer-events:none;animation:coinUp 1s ease-out forwards;z-index:20;white-space:nowrap;font-family:'Fredoka One',cursive;color:#FFD700;text-shadow:1px 1px 3px rgba(0,0,0,0.6);}
@keyframes coinUp{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-60px);opacity:0}}

/* CITY AREA */
#cityScroll{
  position:fixed;
  left:0;right:0;
  bottom:191px;
  height:calc(100vh - 191px - 88px);
  z-index:4;
  overflow-x:auto;
  overflow-y:visible;
}
#cityScroll::-webkit-scrollbar{height:4px;}
#cityScroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.4);border-radius:4px;}
#cityInner{
  display:inline-flex;
  align-items:flex-end;
  padding:0 10px;
  gap:8px;
  min-height:100%;
}

/* BUILDING SLOT */
.bSlot{
  display:flex;
  flex-direction:column;
  align-items:center;
  flex-shrink:0;
  position:relative;
}
.bBody{
  position:relative;
  border-radius:8px 8px 0 0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  padding-bottom:5px;
  cursor:pointer;
  transition:filter 0.15s;
}
.bSlot:hover .bBody{filter:brightness(1.1);}
.bRoof{position:absolute;top:-16px;left:-4px;right:-4px;height:20px;border-radius:6px 6px 0 0;}
.bWins{position:absolute;top:8px;left:5px;right:5px;display:grid;gap:2px;}
.bWin{background:rgba(255,255,255,0.6);border-radius:2px;height:5px;}
.bWin.lit{background:#FFE066;}
.bEmoji{font-size:18px;position:relative;z-index:2;}
.bBadge{
  position:absolute;top:-10px;right:-8px;
  background:#FFD700;border:2px solid #FF8C00;
  border-radius:9px;padding:1px 5px;
  font-size:9px;font-weight:800;color:#333;
  font-family:'Fredoka One',cursive;white-space:nowrap;z-index:5;
}
.bLabel{
  font-family:'Fredoka One',cursive;font-size:9px;
  color:white;text-shadow:1px 1px 2px rgba(0,0,0,0.7);
  margin-top:2px;text-align:center;line-height:1.2;
}
.bUpBtn{
  margin-top:4px;
  background:linear-gradient(135deg,#FF7A00,#FF5000);
  border:2px solid #cc4000;
  border-radius:10px;
  padding:5px 6px;
  color:white;
  font-family:'Fredoka One',cursive;
  font-size:10px;
  cursor:pointer;
  white-space:nowrap;
  width:100%;
  text-align:center;
  box-shadow:0 3px 0 #992e00;
}
.bUpBtn:active:not([disabled]){transform:translateY(2px);box-shadow:0 1px 0 #992e00;}
.bUpBtn[disabled]{
  background:linear-gradient(135deg,#ccc,#aaa)!important;
  border-color:#888!important;box-shadow:0 3px 0 #555!important;
  cursor:not-allowed;opacity:0.65;
}
.bMaxBtn{
  background:linear-gradient(135deg,#FFD700,#FFA000)!important;
  border-color:#cc8000!important;box-shadow:0 3px 0 #996000!important;
  cursor:default;
}
.bEmpty{
  width:64px;height:68px;
  border:3px dashed rgba(255,255,255,0.4);
  border-radius:8px;display:flex;
  align-items:center;justify-content:center;
  font-size:24px;opacity:0.4;flex-shrink:0;
}

/* HUD TOP */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:200;
  padding:7px 10px;display:flex;gap:6px;align-items:center;
  background:linear-gradient(180deg,rgba(0,0,0,0.55),transparent);
}
.hBox{background:rgba(255,255,255,0.96);border-radius:16px;padding:4px 10px;display:flex;align-items:center;gap:5px;box-shadow:0 3px 12px rgba(0,0,0,0.2);}
.hVal{font-family:'Fredoka One',cursive;font-size:14px;color:#333;min-width:44px;}
.hLbl{font-size:9px;color:#888;font-weight:700;}

/* TOOLBAR (zone + save + refresh + ips) */
#toolbar{
  position:fixed;top:52px;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:center;
  gap:6px;padding:3px 8px;
}
.zBtn{font-family:'Fredoka One',cursive;font-size:11px;padding:3px 11px;border-radius:18px;border:2px solid rgba(255,255,255,0.4);cursor:pointer;color:white;text-shadow:1px 1px 2px rgba(0,0,0,0.5);transition:all 0.2s;}
.zBtn.act{transform:scale(1.08);border-color:white;box-shadow:0 3px 12px rgba(0,0,0,0.3);}
.zBtn.lk{opacity:0.4;cursor:not-allowed;}
#saveBtn{background:linear-gradient(135deg,#4CAF50,#2E7D32);border:2px solid #1B5E20;border-radius:18px;padding:3px 10px;color:white;font-family:'Fredoka One',cursive;font-size:11px;cursor:pointer;box-shadow:0 3px 0 #1B5E20;}
#saveBtn:active{transform:translateY(2px);box-shadow:0 1px 0 #1B5E20;}
#refreshBtn{background:linear-gradient(135deg,#2196F3,#1565C0);border:2px solid #0D47A1;border-radius:18px;padding:3px 10px;color:white;font-family:'Fredoka One',cursive;font-size:11px;cursor:pointer;box-shadow:0 3px 0 #0D47A1;}
#refreshBtn:active{transform:translateY(2px);box-shadow:0 1px 0 #0D47A1;}
#ipsBadge{background:rgba(0,0,0,0.6);color:#FFD700;font-family:'Fredoka One',cursive;font-size:11px;padding:3px 9px;border-radius:18px;white-space:nowrap;}

/* BOTTOM PANEL */
#bottomWrap{position:fixed;bottom:0;left:0;right:0;z-index:200;}
#tabBar{display:flex;background:rgba(255,255,255,0.97);border-top:2px solid #eee;}
.tabBtn{flex:1;padding:7px 4px;text-align:center;cursor:pointer;font-family:'Fredoka One',cursive;font-size:11px;color:#999;border:none;background:none;}
.tabBtn.act{color:#9966FF;border-top:3px solid #9966FF;}
#togBtn{padding:7px 10px;background:none;border:none;font-size:18px;cursor:pointer;border-left:2px solid #eee;}
#panelWrap{background:rgba(255,255,255,0.97);border-radius:18px 18px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,0.12);overflow:hidden;transition:max-height 0.3s ease;}
#panelWrap.open{max-height:158px;overflow-y:auto;}
#panelWrap.closed{max-height:0;}
.panel{display:none;padding:8px 12px;}
.panel.act{display:block;}
.panelTitle{font-family:'Fredoka One',cursive;font-size:12px;color:#666;margin-bottom:6px;}

/* SHOP GRID */
.shopGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;}
.shopItem{background:#f8f9ff;border:2px solid #dde0ff;border-radius:10px;padding:6px 8px;display:flex;align-items:center;gap:6px;cursor:pointer;transition:transform 0.1s;}
.shopItem:active{transform:scale(0.97);}
.shopItem.cantBuy{opacity:0.5;cursor:not-allowed;}
.shopItem.lockedItem{opacity:0.35;cursor:not-allowed;background:#eee;}
.shopEmoji{font-size:18px;}
.shopName{font-family:'Fredoka One',cursive;font-size:11px;color:#333;}
.shopDesc{font-size:9px;color:#aaa;}
.shopPrice{font-family:'Fredoka One',cursive;font-size:11px;color:#FF7A00;white-space:nowrap;}
.shopLocked{font-size:9px;color:#bbb;}

/* QUEST */
.questItem{background:#fffbe6;border:2px solid #FFD700;border-radius:10px;padding:8px;margin-bottom:5px;}
.questTitle{font-family:'Fredoka One',cursive;font-size:12px;color:#333;}
.questDesc{font-size:10px;color:#999;margin:2px 0;}
.questBar{background:#eee;border-radius:8px;height:6px;overflow:hidden;margin:3px 0;}
.questFill{background:linear-gradient(90deg,#FFD700,#FF8C00);height:100%;border-radius:8px;transition:width 0.5s;}
.questReward{font-family:'Fredoka One',cursive;font-size:10px;color:#FF8C00;}
.questClaim{background:linear-gradient(135deg,#FFD700,#FF8C00);border:none;border-radius:8px;padding:3px 10px;font-family:'Fredoka One',cursive;font-size:11px;color:white;cursor:pointer;margin-top:3px;}

/* NOTIF */
.notif{position:fixed;top:44%;left:50%;transform:translate(-50%,-50%) scale(0);background:linear-gradient(135deg,#FFD700,#FF8C00);border-radius:18px;padding:12px 26px;font-family:'Fredoka One',cursive;font-size:20px;color:white;z-index:500;box-shadow:0 8px 30px rgba(255,140,0,0.5);animation:notifPop 2s ease forwards;text-align:center;pointer-events:none;}
@keyframes notifPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}15%{transform:translate(-50%,-50%) scale(1.05);opacity:1}75%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(0.9);opacity:0}}
.sparkle{position:fixed;font-size:16px;pointer-events:none;animation:spk 0.9s ease-out forwards;z-index:400;}
@keyframes spk{0%{transform:translate(0,0) scale(0);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(1);opacity:0}}

/* SAVE INDICATOR */
#saveMsg{position:fixed;bottom:205px;right:10px;background:rgba(0,160,0,0.9);color:white;font-family:'Fredoka One',cursive;font-size:11px;padding:3px 10px;border-radius:18px;z-index:300;display:none;}

/* LOGIN */
#loginScreen{position:fixed;inset:0;z-index:999;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
#loginScreen h1{font-family:'Fredoka One',cursive;font-size:42px;color:#FFD700;text-shadow:0 0 30px rgba(255,215,0,0.6);}
#googleBtn{background:white;border:none;border-radius:16px;padding:12px 24px;font-family:'Fredoka One',cursive;font-size:16px;color:#333;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,0.4);transition:all 0.2s;}
#googleBtn:hover{transform:scale(1.05);}
#userBar{position:fixed;top:7px;right:8px;z-index:300;display:none;align-items:center;gap:5px;}
#userAvatar{width:26px;height:26px;border-radius:50%;border:2px solid white;}
#userName{font-family:'Fredoka One',cursive;font-size:11px;color:white;text-shadow:1px 1px 3px rgba(0,0,0,0.6);}
#logoutBtn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:8px;padding:2px 6px;color:white;font-size:10px;cursor:pointer;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div style="font-size:68px">🏙️</div>
  <h1>City Tycool</h1>
  <p style="color:#aaa;font-size:14px">สร้างอาณาจักรธุรกิจของคุณ!</p>
  <button id="googleBtn"><img src="https://www.google.com/favicon.ico" style="width:20px"> เข้าสู่ระบบด้วย Google</button>
  <p style="font-size:11px;color:#555">เซฟข้อมูลอัตโนมัติ ✨</p>
</div>

<!-- USER BAR -->
<div id="userBar">
  <img id="userAvatar" src="" alt="">
  <span id="userName"></span>
  <button id="logoutBtn">ออก</button>
</div>
<div id="saveMsg">💾 บันทึกแล้ว!</div>

<!-- GAME BG -->
<div id="sky"></div>
<div id="gnd"></div>
<div id="road"></div>
<div id="truckLayer"></div>

<!-- CITY -->
<div id="cityScroll"><div id="cityInner"></div></div>

<!-- HUD -->
<div id="hud">
  <div class="hBox">
    <span style="font-size:17px">💰</span>
    <div><div class="hVal" id="hMoney">0</div><div class="hLbl">เหรียญ</div></div>
  </div>
  <div class="hBox">
    <span style="font-size:17px">⭐</span>
    <div><div class="hVal" id="hLevel">1</div><div class="hLbl">เลเวล</div></div>
  </div>
  <div class="hBox" style="flex:1">
    <span style="font-size:14px">📈</span>
    <div style="flex:1;margin-left:4px">
      <div style="font-size:9px;color:#888;font-weight:700">EXP</div>
      <div style="background:#eee;border-radius:6px;height:6px;margin-top:2px;overflow:hidden">
        <div id="expBar" style="background:linear-gradient(90deg,#9966FF,#FF66CC);height:100%;width:0%;border-radius:6px;transition:width 0.3s"></div>
      </div>
    </div>
  </div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button id="saveBtn" onclick="manualSave()">💾 เซฟ</button>
  <button class="zBtn act" style="background:linear-gradient(135deg,#4CAF50,#2E7D32)" id="z0" onclick="switchZone(0)">🌿 เล็ก</button>
  <button class="zBtn lk" style="background:linear-gradient(135deg,#2196F3,#1565C0)" id="z1" onclick="switchZone(1)">🏙️ Lv.20</button>
  <button class="zBtn lk" style="background:linear-gradient(135deg,#9C27B0,#6A1B9A)" id="z2" onclick="switchZone(2)">🌆 Lv.55</button>
  <span id="ipsBadge">+0/วิ</span>
  <button id="refreshBtn" onclick="location.reload()">🔄 รีเฟรช</button>
</div>

<!-- BOTTOM -->
<div id="bottomWrap">
  <div id="panelWrap" class="open">
    <div class="panel act" id="panel-shop">
      <div class="panelTitle">🏗️ ซื้ออาคารใหม่</div>
      <div class="shopGrid" id="shopGrid"></div>
    </div>
    <div class="panel" id="panel-quest">
      <div class="panelTitle">📋 ภารกิจ</div>
      <div id="questList"></div>
    </div>
    <div class="panel" id="panel-info">
      <div class="panelTitle">📊 สถิติ</div>
      <div id="statsText" style="font-size:11px;color:#555;line-height:1.9"></div>
    </div>
  </div>
  <div id="tabBar">
    <button class="tabBtn act" onclick="switchTab('shop',this)">🏗️ ซื้อ</button>
    <button class="tabBtn" onclick="switchTab('quest',this)">📋 ภารกิจ</button>
    <button class="tabBtn" onclick="switchTab('info',this)">📊 สถิติ</button>
    <button id="togBtn" onclick="togglePanel()">🔼</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
// ===== FIREBASE =====
firebase.initializeApp({
  apiKey:"AIzaSyASRB9Ved_Va_OoAXIpc1glavQ-cMmAs74",
  authDomain:"book-classic.firebaseapp.com",
  projectId:"book-classic",
  storageBucket:"book-classic.firebasestorage.app",
  messagingSenderId:"402719934660",
  appId:"1:402719934660:web:b59916175365e60637a191"
});
const auth=firebase.auth(), db=firebase.firestore();
let currentUser=null, gameStarted=false, autoSaveTimer=null;

document.getElementById('googleBtn').onclick=()=>
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>alert(e.message));
document.getElementById('logoutBtn').onclick=()=>auth.signOut().then(()=>location.reload());

auth.onAuthStateChanged(async user=>{
  if(user){
    currentUser=user;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('userBar').style.display='flex';
    document.getElementById('userAvatar').src=user.photoURL||'';
    document.getElementById('userName').textContent=user.displayName?.split(' ')[0]||'ผู้เล่น';
    if(!gameStarted){await loadGame();startGame();gameStarted=true;}
  } else {
    document.getElementById('loginScreen').style.display='flex';
  }
});

async function saveGame(showMsg=true){
  if(!currentUser)return;
  try{
    await db.collection('saves').doc(currentUser.uid).set({
      money:G.money, exp:G.exp, level:G.level,
      zones:G.zones.map(z=>({
        unlocked:z.unlocked,
        buildings:z.buildings.map(b=>({id:b.id,lv:b.lv}))
      })),
      quests:G.quests.map(q=>({id:q.id,progress:q.progress,claimed:q.claimed})),
      totalEarned:G.totalEarned, totalBuilt:G.totalBuilt,
      savedAt:new Date().toISOString()
    });
    if(showMsg){
      const s=document.getElementById('saveMsg');
      s.style.display='block';
      setTimeout(()=>s.style.display='none',2000);
    }
  }catch(e){console.error('Save error:',e);}
}

async function loadGame(){
  if(!currentUser)return;
  try{
    const snap=await db.collection('saves').doc(currentUser.uid).get();
    if(!snap.exists)return;
    const d=snap.data();
    G.money=d.money||100; G.exp=d.exp||0; G.level=d.level||1;
    G.totalEarned=d.totalEarned||0; G.totalBuilt=d.totalBuilt||0;
    if(d.zones){
      d.zones.forEach((z,i)=>{
        if(!G.zones[i])return;
        G.zones[i].unlocked=z.unlocked??false;
        G.zones[i].buildings=(z.buildings||[]).map(b=>({
          id: b.id||b.type,   // รองรับ format เก่า
          lv: b.lv||b.level||1
        })).filter(b=>SHOPS.some(s=>s.id===b.id));
      });
    }
    G.zones[0].unlocked=true;
    if(d.quests){
      d.quests.forEach(sq=>{
        const q=G.quests.find(x=>x.id===sq.id);
        if(q){q.progress=sq.progress||0;q.claimed=sq.claimed||false;}
      });
    }
    showNotif('🔄 โหลดข้อมูลแล้ว!');
  }catch(e){console.error('Load error:',e);}
}

function scheduleSave(){
  if(autoSaveTimer)clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(()=>saveGame(false),5000);
}
function manualSave(){saveGame(true);}

// ===== GAME DATA =====
const SHOPS=[
  {id:'farm',    name:'🌾 ฟาร์ม',        e:'🌾',z:0,lv:1, bc:50,     ib:3,     cl:'#8BC34A',tr:'🚜',ms:8000, ds:'ผลิตพืชผัก',mx:20},
  {id:'bakery',  name:'🥖 เบเกอรี่',     e:'🥖',z:0,lv:2, bc:120,    ib:7,     cl:'#FF9800',tr:'🚐',ms:9000, ds:'ขายขนมปัง',mx:20},
  {id:'woodmill',name:'🪵 โรงเลื่อย',    e:'🪵',z:0,lv:3, bc:200,    ib:12,    cl:'#795548',tr:'🚛',ms:10000,ds:'แปรรูปไม้',mx:20},
  {id:'fishmarket',name:'🐟 ตลาดปลา',   e:'🐟',z:0,lv:5, bc:350,    ib:18,    cl:'#03A9F4',tr:'🚌',ms:10000,ds:'อาหารทะเล',mx:20},
  {id:'smithy',  name:'⚒️ ช่างตีเหล็ก', e:'⚒️',z:0,lv:8, bc:600,    ib:28,    cl:'#607D8B',tr:'🚚',ms:11000,ds:'ผลิตเครื่องมือ',mx:20},
  {id:'tavern',  name:'🍺 โรงเหล้า',     e:'🍺',z:0,lv:10,bc:900,    ib:40,    cl:'#FF5722',tr:'🚐',ms:11000,ds:'เครื่องดื่ม',mx:20},
  {id:'ranch',   name:'🐄 ฟาร์มโค',      e:'🐄',z:0,lv:12,bc:1400,   ib:58,    cl:'#4CAF50',tr:'🚜',ms:12000,ds:'เลี้ยงสัตว์',mx:20},
  {id:'mine',    name:'⛏️ เหมือง',       e:'⛏️',z:0,lv:15,bc:2200,   ib:85,    cl:'#9E9E9E',tr:'🚛',ms:12000,ds:'ขุดแร่',mx:20},
  {id:'factory', name:'🏭 โรงงาน',       e:'🏭',z:1,lv:20,bc:4000,   ib:140,   cl:'#FF8C42',tr:'🚚',ms:8000, ds:'สินค้าอุตฯ',mx:20},
  {id:'bank',    name:'🏦 ธนาคาร',       e:'🏦',z:1,lv:22,bc:7000,   ib:220,   cl:'#DAA520',tr:'🚌',ms:9000, ds:'การเงิน',mx:20},
  {id:'mall',    name:'🏬 ห้าง',          e:'🏬',z:1,lv:25,bc:12000,  ib:350,   cl:'#E91E63',tr:'🚐',ms:9000, ds:'ศูนย์การค้า',mx:20},
  {id:'hospital',name:'🏥 โรงพยาบาล',   e:'🏥',z:1,lv:28,bc:20000,  ib:520,   cl:'#F44336',tr:'🚑',ms:10000,ds:'สุขภาพ',mx:20},
  {id:'hotel',   name:'🏨 โรงแรม',       e:'🏨',z:1,lv:32,bc:35000,  ib:780,   cl:'#9C27B0',tr:'🚌',ms:10000,ds:'ที่พักหรู',mx:20},
  {id:'stadium', name:'🏟️ สนามกีฬา',    e:'🏟️',z:1,lv:36,bc:55000,  ib:1100,  cl:'#00BCD4',tr:'🚌',ms:11000,ds:'กีฬา',mx:20},
  {id:'airport', name:'✈️ สนามบิน',      e:'✈️',z:1,lv:42,bc:90000,  ib:1600,  cl:'#3F51B5',tr:'🚌',ms:11000,ds:'ขนส่งอากาศ',mx:20},
  {id:'powerplant',name:'⚡ โรงไฟฟ้า',  e:'⚡',z:1,lv:48,bc:150000, ib:2400,  cl:'#FFC107',tr:'🚛',ms:12000,ds:'พลังงาน',mx:20},
  {id:'spaceport',name:'🚀 ท่าอวกาศ',   e:'🚀',z:2,lv:55,bc:300000, ib:4000,  cl:'#1A237E',tr:'🚀',ms:7000, ds:'อวกาศ',mx:20},
  {id:'casino',  name:'🎰 คาสิโน',       e:'🎰',z:2,lv:60,bc:500000, ib:6500,  cl:'#880E4F',tr:'🚌',ms:7000, ds:'บันเทิง',mx:20},
  {id:'research',name:'🔬 วิจัย',         e:'🔬',z:2,lv:65,bc:800000, ib:10000, cl:'#00695C',tr:'🚐',ms:8000, ds:'R&D',mx:20},
  {id:'arcology',name:'🌐 อาคารอัจฉริยะ',e:'🌐',z:2,lv:72,bc:1500000,ib:16000, cl:'#4527A0',tr:'🚛',ms:8000, ds:'เมืองในอาคาร',mx:20},
  {id:'fusion',  name:'☢️ ฟิวชัน',       e:'☢️',z:2,lv:80,bc:3000000,ib:28000, cl:'#B71C1C',tr:'🚌',ms:8000, ds:'พลังงานนิวเคลียร์',mx:20},
  {id:'quantum', name:'💎 ควอนตัม',      e:'💎',z:2,lv:90,bc:6000000,ib:50000, cl:'#006064',tr:'🚐',ms:9000, ds:'เทคโนโลยีอนาคต',mx:20},
  {id:'dyson',   name:'🌟 ไดสัน สเฟียร์',e:'🌟',z:2,lv:100,bc:20000000,ib:120000,cl:'#E65100',tr:'🚀',ms:6000,ds:'พลังงานดาว',mx:20},
];

const ZONES=[
  {nm:'🌿 เมืองเล็ก',ulv:1, sky:'linear-gradient(180deg,#5BA3D9,#ADE4FF)',gnd:'linear-gradient(180deg,#7BC47F,#5DBB63 30%,#4CAF50)',rd:'#7B7B7B'},
  {nm:'🏙️ เมืองใหญ่',ulv:20,sky:'linear-gradient(180deg,#546E7A,#78909C)',gnd:'linear-gradient(180deg,#616161,#424242 30%,#212121)',rd:'#424242'},
  {nm:'🌆 มหานคร',   ulv:55,sky:'linear-gradient(180deg,#1A237E,#283593)',gnd:'linear-gradient(180deg,#1B1B2F,#16213e 30%,#0f3460)',rd:'#1B1B2F'},
];

const QUESTS=[
  {id:'q1',t:'💰 สะสม I',   d:'หาเงิน 1K',    tp:'earn', tg:1000,    rw:200,    xp:50},
  {id:'q2',t:'💰 สะสม II',  d:'หาเงิน 50K',   tp:'earn', tg:50000,   rw:5000,   xp:200},
  {id:'q3',t:'💰 เศรษฐี',   d:'หาเงิน 1M',    tp:'earn', tg:1000000, rw:50000,  xp:500},
  {id:'q4',t:'🏗️ สร้าง I',  d:'สร้าง 3 หลัง', tp:'build',tg:3,       rw:300,    xp:80},
  {id:'q5',t:'🏗️ สร้าง II', d:'สร้าง 10 หลัง',tp:'build',tg:10,      rw:2000,   xp:300},
  {id:'q6',t:'🏗️ สถาปนิก', d:'สร้าง 30 หลัง',tp:'build',tg:30,      rw:20000,  xp:800},
  {id:'q7',t:'⭐ Lv.10',     d:'ถึงเลเวล 10',  tp:'level',tg:10,      rw:1000,   xp:100},
  {id:'q8',t:'⭐ Lv.25',     d:'ถึงเลเวล 25',  tp:'level',tg:25,      rw:10000,  xp:400},
  {id:'q9',t:'⭐ Lv.50',     d:'ถึงเลเวล 50',  tp:'level',tg:50,      rw:200000, xp:2000},
  {id:'q10',t:'🏙️ โซน 2',  d:'ปลดล็อคเมืองใหญ่',tp:'zone',tg:1,   rw:5000,   xp:500},
  {id:'q11',t:'🌆 โซน 3',   d:'ปลดล็อคมหานคร',tp:'zone', tg:2,      rw:100000, xp:2000},
];

// ===== GAME STATE =====
const G={
  money:100, exp:0, level:1, cz:0,
  totalEarned:0, totalBuilt:0, ips:0,
  lastTick:Date.now(),
  zones:[
    {unlocked:true, buildings:[]},
    {unlocked:false,buildings:[]},
    {unlocked:false,buildings:[]},
  ],
  quests:QUESTS.map(q=>({...q,progress:0,claimed:false}))
};
const MAX=20;
const fmt=n=>n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':Math.floor(n).toString();
const getInc=(t,lv)=>Math.floor(t.ib*Math.pow(1.35,lv-1));
const getUpCost=(t,lv)=>Math.floor(t.bc*Math.pow(1.55,lv));
const getBuyCost=(t,own)=>Math.floor(t.bc*Math.pow(1.4,own));
const expNeeded=lv=>Math.floor(100*Math.pow(1.18,lv-1));
const calcIPS=()=>{let s=0;G.zones.forEach(z=>z.buildings.forEach(b=>{const t=SHOPS.find(x=>x.id===b.id);if(t)s+=getInc(t,b.lv);}));return s;};

function addExp(a){
  G.exp+=a;
  while(G.level<100){
    const n=expNeeded(G.level);
    if(G.exp>=n){G.exp-=n;G.level++;onLevelUp();}
    else break;
  }
}
function onLevelUp(){
  showNotif(`⭐ เลเวล ${G.level}!`);doSparkles();
  ZONES.forEach((z,i)=>{
    if(G.level>=z.ulv&&!G.zones[i].unlocked){
      G.zones[i].unlocked=true;
      showNotif(`🗺️ ปลดล็อค ${z.nm}!`);
    }
  });
  updateZoneBar();updateQuests();scheduleSave();
}

function updateHUD(){
  document.getElementById('hMoney').textContent=fmt(G.money);
  document.getElementById('hLevel').textContent=G.level;
  const n=G.level<100?expNeeded(G.level):1;
  document.getElementById('expBar').style.width=Math.min(100,(G.exp/n)*100)+'%';
  G.ips=calcIPS();
  document.getElementById('ipsBadge').textContent=`+${fmt(G.ips)}/วิ`;
}

function updateZoneBar(){
  ZONES.forEach((z,i)=>{
    const b=document.getElementById(`z${i}`);
    b.classList.toggle('lk',!G.zones[i].unlocked);
    b.classList.toggle('act',G.cz===i);
    b.textContent=G.zones[i].unlocked?z.nm.replace('🌿 ','🌿').replace('🏙️ ','🏙️').replace('🌆 ','🌆'):`🔒Lv${z.ulv}`;
  });
}

function switchZone(i){
  if(!G.zones[i].unlocked){showNotif(`🔒 ต้องการ Lv.${ZONES[i].ulv}`);return;}
  G.cz=i;
  document.getElementById('sky').style.background=ZONES[i].sky;
  document.getElementById('gnd').style.background=ZONES[i].gnd;
  document.getElementById('road').style.background=ZONES[i].rd;
  updateZoneBar();renderBuildings();renderShop();
}

// ===== BUILDINGS =====
function renderBuildings(){
  const inner=document.getElementById('cityInner');
  inner.innerHTML='';
  const zone=G.zones[G.cz];
  const areaH=document.getElementById('cityScroll').clientHeight;

  zone.buildings.forEach((b,idx)=>{
    const t=SHOPS.find(x=>x.id===b.id);if(!t)return;
    const lv=b.lv, isMax=lv>=t.mx;
    // Cap building height so it fits in area
    const maxH=Math.max(60, areaH-60);
    const rawH=65+lv*11;
    const h=Math.min(rawH, maxH);
    const w=60+lv*3;
    const uc=getUpCost(t,lv);
    const canAfford=G.money>=uc;

    const slot=document.createElement('div');
    slot.className='bSlot';

    // Building body
    const body=document.createElement('div');
    body.className='bBody';
    body.style.cssText=`width:${w}px;height:${h}px;background:linear-gradient(170deg,${t.cl}EE,${t.cl}77);border:3px solid ${t.cl};box-shadow:4px 6px 0 rgba(0,0,0,0.25),inset 0 2px 0 rgba(255,255,255,0.3);`;

    const roof=document.createElement('div');
    roof.className='bRoof';
    roof.style.cssText=`background:${t.cl};border:3px solid ${t.cl};`;
    body.appendChild(roof);

    const wins=document.createElement('div');wins.className='bWins';
    const wc=Math.min(2+Math.floor(lv/2),12);
    wins.style.gridTemplateColumns=`repeat(${Math.min(wc,2)},1fr)`;
    for(let i=0;i<wc;i++){
      const w2=document.createElement('div');
      w2.className='bWin'+(Math.random()>0.35?' lit':'');
      wins.appendChild(w2);
    }
    body.appendChild(wins);

    const em=document.createElement('div');em.className='bEmoji';em.textContent=t.e;
    body.appendChild(em);
    slot.appendChild(body);

    // Income badge
    const badge=document.createElement('div');badge.className='bBadge';
    badge.textContent=`+${fmt(getInc(t,lv))}/s`;
    slot.appendChild(badge);

    // Label
    const label=document.createElement('div');label.className='bLabel';
    label.innerHTML=`${t.name}<br>Lv.${lv}`;
    slot.appendChild(label);

    // Upgrade button — always visible
    const btn=document.createElement('button');
    btn.dataset.zone=G.cz;
    btn.dataset.idx=idx;
    if(isMax){
      btn.className='bUpBtn bMaxBtn';
      btn.textContent='✨ MAX!';
      btn.disabled=true;
    } else {
      btn.className='bUpBtn';
      btn.textContent=`⬆️ ${fmt(uc)}💰`;
      btn.disabled=!canAfford;
      btn.onclick=()=>doUpgrade(G.cz,idx);
    }
    slot.appendChild(btn);
    inner.appendChild(slot);
  });

  if(zone.buildings.length<MAX){
    const e=document.createElement('div');e.className='bEmpty';e.textContent='+';
    inner.appendChild(e);
  }
}

function refreshButtons(){
  document.querySelectorAll('.bUpBtn:not(.bMaxBtn)').forEach(btn=>{
    const zi=parseInt(btn.dataset.zone);
    const bi=parseInt(btn.dataset.idx);
    const b=G.zones[zi]?.buildings[bi];if(!b)return;
    const t=SHOPS.find(x=>x.id===b.id);if(!t)return;
    const uc=getUpCost(t,b.lv);
    btn.disabled=G.money<uc;
    btn.textContent=`⬆️ ${fmt(uc)}💰`;
  });
}

function doUpgrade(zi,bi){
  const b=G.zones[zi].buildings[bi];
  const t=SHOPS.find(x=>x.id===b.id);
  const uc=getUpCost(t,b.lv);
  if(G.money<uc||b.lv>=t.mx){showNotif('💰 เงินไม่พอ!');return;}
  G.money-=uc;b.lv++;
  addExp(20+t.z*15);doSparkles();
  showNotif(`⬆️ ${t.name} Lv.${b.lv}!`);
  renderBuildings();updateHUD();renderShop();scheduleSave();
}

// ===== SHOP =====
function renderShop(){
  const g=document.getElementById('shopGrid');g.innerHTML='';
  SHOPS.filter(t=>t.z===G.cz).forEach(t=>{
    const locked=G.level<t.lv;
    const own=G.zones[G.cz].buildings.filter(b=>b.id===t.id).length;
    const cost=getBuyCost(t,own);
    const full=G.zones[G.cz].buildings.length>=MAX;
    const ca=G.money>=cost;
    const item=document.createElement('div');
    item.className=locked?'shopItem lockedItem':(!ca||full)?'shopItem cantBuy':'shopItem';
    item.innerHTML=`<div class="shopEmoji">${t.e}</div><div style="flex:1;min-width:0"><div class="shopName">${t.name}</div><div class="shopDesc">${t.ds}</div>${locked?`<div class="shopLocked">🔒 Lv.${t.lv}</div>`:''}</div><div class="shopPrice">${locked?'🔒':fmt(cost)+'💰'}</div>`;
    if(!locked&&ca&&!full)item.onclick=()=>buyBuilding(t);
    g.appendChild(item);
  });
}

function buyBuilding(t){
  const zone=G.zones[G.cz];
  const own=zone.buildings.filter(b=>b.id===t.id).length;
  const cost=getBuyCost(t,own);
  if(G.money<cost||zone.buildings.length>=MAX)return;
  G.money-=cost;
  zone.buildings.push({id:t.id,lv:1});
  G.totalBuilt++;addExp(25+t.z*15);updateQuests();
  renderBuildings();renderShop();updateHUD();
  startTruck(G.cz,zone.buildings.length-1);
  showNotif(`🏗️ ${t.name}!`);scheduleSave();
}

// ===== TRUCKS =====
let truckCount=0;
function startTruck(zi,bi){
  const b=G.zones[zi]?.buildings[bi];if(!b)return;
  const t=SHOPS.find(x=>x.id===b.id);if(!t)return;
  function go(){
    if(!G.zones[zi]?.buildings[bi])return;
    const lv=G.zones[zi].buildings[bi]?.lv||1;
    if(zi!==G.cz){
      const r=getInc(t,lv);G.money+=r;G.totalEarned+=r;addExp(1);updateQuests();
      setTimeout(go,t.ms/lv);return;
    }
    if(truckCount>=3){setTimeout(go,2000);return;}
    truckCount++;
    const layer=document.getElementById('truckLayer');
    const tk=document.createElement('div');tk.className='truck';tk.textContent=t.tr;
    const dur=3+Math.random()*2;
    tk.style.cssText=`animation-duration:${dur}s;bottom:${4+Math.random()*18}px;`;
    layer.appendChild(tk);
    setTimeout(()=>{
      const b2=G.zones[zi]?.buildings[bi];if(!b2)return;
      const r=getInc(t,b2.lv);G.money+=r;G.totalEarned+=r;addExp(1);updateQuests();
      const coin=document.createElement('div');coin.className='coinPop';
      coin.textContent=`+${fmt(r)}💰`;
      coin.style.cssText=`left:${25+Math.random()*50}%;top:36%;`;
      document.body.appendChild(coin);
      setTimeout(()=>coin.remove(),1000);
      updateHUD();
    },dur*450);
    setTimeout(()=>{tk.remove();truckCount=Math.max(0,truckCount-1);},dur*1000+200);
    setTimeout(go,t.ms/Math.max(1,G.zones[zi]?.buildings[bi]?.lv||1));
  }
  setTimeout(go,500+Math.random()*3000);
}

// ===== QUESTS =====
function updateQuests(){
  G.quests.forEach(q=>{
    if(q.claimed)return;
    if(q.tp==='earn')  q.progress=Math.min(q.tg,G.totalEarned);
    if(q.tp==='build') q.progress=Math.min(q.tg,G.totalBuilt);
    if(q.tp==='level') q.progress=Math.min(q.tg,G.level);
    if(q.tp==='zone')  q.progress=Math.min(q.tg,G.zones.filter(z=>z.unlocked).length-1);
  });
}
function renderQuests(){
  updateQuests();
  const l=document.getElementById('questList');l.innerHTML='';
  G.quests.forEach(q=>{
    const pct=Math.min(100,(q.progress/q.tg)*100);
    const done=q.progress>=q.tg;
    const d=document.createElement('div');d.className='questItem';
    d.innerHTML=`
      <div class="questTitle">${q.claimed?'✅':''} ${q.t}</div>
      <div class="questDesc">${q.d} (${fmt(q.progress)}/${fmt(q.tg)})</div>
      <div class="questBar"><div class="questFill" style="width:${pct}%"></div></div>
      <div class="questReward">🎁 ${fmt(q.rw)}💰 + ${q.xp} EXP</div>
      ${done&&!q.claimed?`<button class="questClaim" onclick="claimQuest('${q.id}')">รับรางวัล!</button>`:''}
      ${q.claimed?'<div style="font-size:10px;color:#bbb;margin-top:2px">รับแล้ว ✓</div>':''}
    `;
    l.appendChild(d);
  });
}
function claimQuest(id){
  const q=G.quests.find(x=>x.id===id);
  if(!q||q.claimed||q.progress<q.tg)return;
  q.claimed=true;G.money+=q.rw;addExp(q.xp);
  showNotif(`🎁 ${fmt(q.rw)}💰!`);doSparkles();
  updateHUD();renderQuests();scheduleSave();
}

// ===== TABS & PANEL =====
let panelOpen=true;
function togglePanel(){
  panelOpen=!panelOpen;
  document.getElementById('panelWrap').className=panelOpen?'open':'closed';
  document.getElementById('togBtn').textContent=panelOpen?'🔼':'🔽';
}
function switchTab(name,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('act'));
  document.querySelectorAll('.tabBtn').forEach(t=>t.classList.remove('act'));
  document.getElementById(`panel-${name}`).classList.add('act');
  el.classList.add('act');
  if(!panelOpen){panelOpen=true;document.getElementById('panelWrap').className='open';document.getElementById('togBtn').textContent='🔼';}
  if(name==='quest')renderQuests();
  if(name==='info')renderStats();
}
function renderStats(){
  const tb=G.zones.reduce((s,z)=>s+z.buildings.length,0);
  document.getElementById('statsText').innerHTML=
    `🏙️ โซนปลดล็อค: ${G.zones.filter(z=>z.unlocked).length}/3<br>`+
    `🏗️ อาคารทั้งหมด: ${tb}<br>`+
    `💰 รายได้/วิ: ${fmt(G.ips)}<br>`+
    `📊 รายได้สะสม: ${fmt(G.totalEarned)}<br>`+
    `⭐ เลเวล: ${G.level}/100<br>`+
    `📋 ภารกิจสำเร็จ: ${G.quests.filter(q=>q.claimed).length}/${G.quests.length}`;
}

// ===== FX =====
let notifTimer;
function showNotif(tx){
  document.querySelector('.notif')?.remove();
  if(notifTimer)clearTimeout(notifTimer);
  const n=document.createElement('div');n.className='notif';n.textContent=tx;
  document.body.appendChild(n);
  notifTimer=setTimeout(()=>n.remove(),2100);
}
function doSparkles(){
  const cx=window.innerWidth/2,cy=window.innerHeight*0.42;
  for(let i=0;i<8;i++){
    const s=document.createElement('div');s.className='sparkle';
    const a=(i/8)*Math.PI*2,d=45+Math.random()*45;
    s.style.cssText=`left:${cx}px;top:${cy}px;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;animation-delay:${Math.random()*0.2}s`;
    s.textContent=['⭐','✨','💫','🌟'][Math.floor(Math.random()*4)];
    document.body.appendChild(s);setTimeout(()=>s.remove(),1100);
  }
}

// ===== CLOUDS =====
for(let i=0;i<5;i++){
  const c=document.createElement('div');c.className='cloud';
  c.style.cssText=`width:${45+Math.random()*80}px;height:${12+Math.random()*20}px;top:${2+Math.random()*22}%;animation-duration:${22+Math.random()*20}s;animation-delay:${-Math.random()*22}s;`;
  document.getElementById('sky').appendChild(c);
}

// ===== GAME TICK =====
function gameTick(){
  const now=Date.now(),dt=(now-G.lastTick)/1000;
  G.lastTick=now;
  G.money+=G.ips*dt*0.25;
  G.totalEarned+=G.ips*dt*0.25;
  updateHUD();
  refreshButtons(); // update button states every tick
}

// ===== START =====
function startGame(){
  switchZone(0);
  if(G.zones[0].buildings.length===0){
    G.zones[0].buildings.push({id:'farm',lv:1});
    G.totalBuilt=1;
  }
  G.zones.forEach((zone,zi)=>zone.buildings.forEach((_,bi)=>startTruck(zi,bi)));
  renderBuildings();renderShop();updateHUD();updateZoneBar();updateQuests();
  setInterval(gameTick,500);
  setInterval(renderShop,3000);
  setInterval(()=>saveGame(false),30000);
}
</script>
