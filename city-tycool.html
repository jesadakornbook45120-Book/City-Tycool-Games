<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');
:root{--or:#FF7A00;--gd:#FFD700;--pan:rgba(255,255,255,0.97);--sh:0 4px 20px rgba(0,0,0,0.2);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;overflow:hidden;height:100vh;user-select:none;}
#gw{width:100vw;height:100vh;position:relative;overflow:hidden;}
#sky{position:absolute;top:0;left:0;right:0;height:28%;z-index:0;transition:background 1s;background:linear-gradient(180deg,#5BA3D9,#ADE4FF);}
#gnd{position:absolute;bottom:0;left:0;right:0;height:72%;z-index:1;transition:background 1s;background:linear-gradient(180deg,#7BC47F,#5DBB63 30%,#4CAF50);}
#road{position:absolute;bottom:148px;left:0;right:0;height:48px;z-index:3;transition:background 1s;background:#7B7B7B;}
#road::before{content:'';position:absolute;top:50%;left:0;right:0;height:4px;background:repeating-linear-gradient(90deg,#FFD700 0,#FFD700 40px,transparent 40px,transparent 80px);transform:translateY(-50%);}
.cloud{position:absolute;background:white;border-radius:50px;opacity:0.75;animation:fc linear infinite;}
@keyframes fc{from{transform:translateX(-250px)}to{transform:translateX(110vw)}}

/* CITY */
#ca{position:absolute;bottom:196px;left:0;right:0;height:420px;z-index:2;display:flex;align-items:flex-end;padding:0 8px;gap:7px;overflow-x:auto;overflow-y:visible;}
#ca::-webkit-scrollbar{height:3px;}
#ca::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.3);border-radius:4px;}
.bs{position:relative;display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.bb{position:relative;border-radius:8px 8px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:5px;transition:filter 0.2s;}
.bs:hover .bb{filter:brightness(1.1);}
.brf{position:absolute;top:-17px;left:-4px;right:-4px;height:21px;border-radius:6px 6px 0 0;}
.bws{position:absolute;top:8px;left:5px;right:5px;display:grid;gap:2px;}
.bw{background:rgba(255,255,255,0.65);border-radius:2px;height:6px;}
.bw.lit{background:#FFE066;}
.bic{font-size:19px;position:relative;z-index:2;}
.bdg{position:absolute;top:-10px;right:-6px;background:#FFD700;border:2px solid #FF8C00;border-radius:9px;padding:1px 5px;font-size:9px;font-weight:800;color:#333;font-family:'Fredoka One',cursive;white-space:nowrap;}
.blb{font-family:'Fredoka One',cursive;font-size:9px;color:white;text-shadow:1px 1px 2px rgba(0,0,0,0.7);margin-top:2px;text-align:center;line-height:1.2;}
.bub{margin-top:4px;border:2px solid #cc4400;border-radius:10px;padding:5px 8px;color:white;font-family:'Fredoka One',cursive;font-size:11px;cursor:pointer;white-space:nowrap;min-width:72px;text-align:center;transition:opacity 0.2s,transform 0.1s;background:linear-gradient(135deg,#FF7A00,#FF5500);box-shadow:0 3px 0 #aa3300;}
.bub:active:not([disabled]){transform:translateY(2px);box-shadow:0 1px 0 #aa3300;}
.bub[disabled]{background:linear-gradient(135deg,#bbb,#999)!important;border-color:#777!important;box-shadow:0 3px 0 #666!important;cursor:not-allowed;opacity:0.6;}
.bub.mx{background:linear-gradient(135deg,#FFD700,#FFA500)!important;border-color:#cc8800!important;box-shadow:0 3px 0 #aa6600!important;cursor:default;}
.be{width:62px;height:72px;border:3px dashed rgba(255,255,255,0.35);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;opacity:0.35;align-self:flex-end;flex-shrink:0;}

/* TRUCKS - max 3 on screen */
#tl{position:absolute;bottom:148px;left:0;right:0;height:48px;z-index:10;pointer-events:none;}
.tk{position:absolute;font-size:22px;bottom:4px;animation:dv linear;filter:drop-shadow(2px 2px 2px rgba(0,0,0,0.3));}
@keyframes dv{0%{left:-70px}100%{left:108%}}
.fc{position:absolute;font-size:13px;pointer-events:none;animation:fu 1s ease-out forwards;z-index:200;white-space:nowrap;font-family:'Fredoka One',cursive;color:#FFD700;text-shadow:1px 1px 2px rgba(0,0,0,0.5);}
@keyframes fu{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-55px);opacity:0}}

/* HUD */

.hv{font-family:'Fredoka One',cursive;font-size:15px;color:#333;min-width:46px;}

#zb{position:fixed;top:54px;left:0;right:0;z-index:100;display:flex;justify-content:center;gap:7px;padding:3px;}
.zn{font-family:'Fredoka One',cursive;font-size:11px;padding:3px 12px;border-radius:18px;border:2px solid rgba(255,255,255,0.4);cursor:pointer;color:white;text-shadow:1px 1px 2px rgba(0,0,0,0.5);transition:all 0.2s;}

.zn.lk{opacity:0.4;cursor:not-allowed;}
#ib{position:fixed;top:56px;right:10px;background:rgba(0,0,0,0.6);color:#FFD700;font-family:'Fredoka One',cursive;font-size:11px;padding:3px 9px;border-radius:18px;z-index:100;}

/* SAVE BUTTON */

.pn{display:none;padding:8px 12px;}

.sp{font-family:'Fredoka One',cursive;font-size:11px;color:var(--or);white-space:nowrap;}

/* QUEST */

.qd{font-size:10px;color:#999;margin:2px 0;}
.qp{background:#eee;border-radius:8px;height:6px;overflow:hidden;margin:3px 0;}
.qf{background:linear-gradient(90deg,#FFD700,#FF8C00);height:100%;border-radius:8px;transition:width 0.5s;}
.qr{font-family:'Fredoka One',cursive;font-size:10px;color:#FF8C00;}
.qc{background:linear-gradient(135deg,#FFD700,#FF8C00);border:none;border-radius:8px;padding:3px 10px;font-family:'Fredoka One',cursive;font-size:11px;color:white;cursor:pointer;margin-top:3px;}

/* NOTIF */
.nf{position:fixed;top:44%;left:50%;transform:translate(-50%,-50%) scale(0);background:linear-gradient(135deg,#FFD700,#FF8C00);border-radius:18px;padding:12px 26px;font-family:'Fredoka One',cursive;font-size:20px;color:white;z-index:500;box-shadow:0 8px 30px rgba(255,140,0,0.5);animation:pi 2s ease forwards;text-align:center;pointer-events:none;}
@keyframes pi{0%{transform:translate(-50%,-50%) scale(0);opacity:0}15%{transform:translate(-50%,-50%) scale(1.05);opacity:1}75%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(0.9);opacity:0}}
.sp2{position:fixed;font-size:16px;pointer-events:none;animation:sk 0.9s ease-out forwards;z-index:400;}
@keyframes sk{0%{transform:translate(0,0) scale(0);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(1);opacity:0}}

/* LOGIN */

#gbtn{background:white;border:none;border-radius:16px;padding:12px 24px;font-family:'Fredoka One',cursive;font-size:16px;color:#333;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,0.4);transition:all 0.2s;}

<script>
firebase.initializeApp({
  apiKey:"AIzaSyASRB9Ved_Va_OoAXIpc1glavQ-cMmAs74",
  authDomain:"book-classic.firebaseapp.com",
  projectId:"book-classic",
  storageBucket:"book-classic.firebasestorage.app",
  messagingSenderId:"402719934660",
  appId:"1:402719934660:web:b59916175365e60637a191"
});
const auth=firebase.auth(), db=firebase.firestore();
let currentUser=null, gameStarted=false, saveTimeout=null;

document.getElementById('gbtn').onclick=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>alert(e.message));
document.getElementById('lob').onclick=()=>auth.signOut().then(()=>location.reload());

auth.onAuthStateChanged(async user=>{
  if(user){
    currentUser=user;
    document.getElementById('lg').style.display='none';
    document.getElementById('ub').style.display='flex';
    document.getElementById('uav').src=user.photoURL||'';
    document.getElementById('unm').textContent=user.displayName?.split(' ')[0]||'ผู้เล่น';
    if(!gameStarted){await loadGame();startGame();gameStarted=true;}
  } else document.getElementById('lg').style.display='flex';
});

async function saveGame(showMsg=true){
  if(!currentUser)return;
  try{
    await db.collection('saves').doc(currentUser.uid).set({
      money:G.money,exp:G.exp,level:G.level,
      zones:G.zones.map(z=>({buildings:z.buildings,unlocked:z.unlocked})),
      quests:G.quests.map(q=>({id:q.id,progress:q.progress,claimed:q.claimed})),
      totalEarned:G.totalEarned,totalBuilt:G.totalBuilt,savedAt:new Date().toISOString()
    });
    if(showMsg){const s=document.getElementById('si');s.style.display='block';setTimeout(()=>s.style.display='none',2000);}
  }catch(e){console.error(e);}
}
async function loadGame(){
  if(!currentUser)return;
  try{
    const snap=await db.collection('saves').doc(currentUser.uid).get();
    if(snap.exists){
      const d=snap.data();
      G.money=d.money||100;G.exp=d.exp||0;G.level=d.level||1;
      G.totalEarned=d.totalEarned||0;G.totalBuilt=d.totalBuilt||0;
      if(d.zones){d.zones.forEach((z,i)=>{if(G.zones[i]){G.zones[i].buildings=z.buildings||[];G.zones[i].unlocked=z.unlocked??false;}});}
      G.zones[0].unlocked=true;
      if(d.quests){d.quests.forEach(sq=>{const q=G.quests.find(x=>x.id===sq.id);if(q){q.progress=sq.progress||0;q.claimed=sq.claimed||false;}});}
      showNotif('🔄 โหลดข้อมูลแล้ว!');
    }
  }catch(e){console.error(e);}
}
function scheduleSave(){if(saveTimeout)clearTimeout(saveTimeout);saveTimeout=setTimeout(()=>saveGame(false),5000);}
function manualSave(){saveGame(true);showNotif('💾 บันทึกแล้ว!');}

  {id:'research',name:'🔬 วิจัย',e:'🔬',z:2,lv:65,bc:800000,ib:10000,cl:'#00695C',tr:'🚐',ms:8000,ds:'R&D',mx:20},
  {id:'arcology',name:'🌐 อาคารอัจฉริยะ',e:'🌐',z:2,lv:72,bc:1500000,ib:16000,cl:'#4527A0',tr:'🚛',ms:8000,ds:'เมืองในอาคาร',mx:20},
  {id:'fusion',name:'☢️ ฟิวชัน',e:'☢️',z:2,lv:80,bc:3000000,ib:28000,cl:'#B71C1C',tr:'🚌',ms:8000,ds:'พลังงานนิวเคลียร์',mx:20},
  {id:'quantum',name:'💎 ควอนตัม',e:'💎',z:2,lv:90,bc:6000000,ib:50000,cl:'#006064',tr:'🚐',ms:9000,ds:'เทคโนโลยีอนาคต',mx:20},
  {id:'dyson',name:'🌟 ไดสัน สเฟียร์',e:'🌟',z:2,lv:100,bc:20000000,ib:120000,cl:'#E65100',tr:'🚀',ms:6000,ds:'พลังงานดาว',mx:20},
];
const ZONES=[
  {nm:'🌿 เมืองเล็ก',ulv:1,sky:'linear-gradient(180deg,#5BA3D9,#ADE4FF)',gnd:'linear-gradient(180deg,#7BC47F,#5DBB63 30%,#4CAF50)',rd:'#7B7B7B'},
  {nm:'🏙️ เมืองใหญ่',ulv:20,sky:'linear-gradient(180deg,#546E7A,#78909C)',gnd:'linear-gradient(180deg,#616161,#424242 30%,#212121)',rd:'#424242'},
  {nm:'🌆 มหานคร',ulv:55,sky:'linear-gradient(180deg,#1A237E,#283593)',gnd:'linear-gradient(180deg,#1B1B2F,#16213e 30%,#0f3460)',rd:'#1B1B2F'},
];
const QD=[
  {id:'q1',t:'💰 สะสม I',d:'หาเงิน 1K',tp:'earn',tg:1000,rw:200,xp:50},
  {id:'q2',t:'💰 สะสม II',d:'หาเงิน 50K',tp:'earn',tg:50000,rw:5000,xp:200},
  {id:'q3',t:'💰 เศรษฐี',d:'หาเงิน 1M',tp:'earn',tg:1000000,rw:50000,xp:500},
  {id:'q4',t:'🏗️ สร้าง I',d:'สร้าง 3 หลัง',tp:'build',tg:3,rw:300,xp:80},
  {id:'q5',t:'🏗️ สร้าง II',d:'สร้าง 10 หลัง',tp:'build',tg:10,rw:2000,xp:300},
  {id:'q6',t:'🏗️ สถาปนิก',d:'สร้าง 30 หลัง',tp:'build',tg:30,rw:20000,xp:800},
  {id:'q7',t:'⭐ Lv.10',d:'ถึงเลเวล 10',tp:'level',tg:10,rw:1000,xp:100},
  {id:'q8',t:'⭐ Lv.25',d:'ถึงเลเวล 25',tp:'level',tg:25,rw:10000,xp:400},
  {id:'q9',t:'⭐ Lv.50',d:'ถึงเลเวล 50',tp:'level',tg:50,rw:200000,xp:2000},
  {id:'q10',t:'🏙️ โซน 2',d:'ปลดล็อคเมืองใหญ่',tp:'zone',tg:1,rw:5000,xp:500},
  {id:'q11',t:'🌆 โซน 3',d:'ปลดล็อคมหานคร',tp:'zone',tg:2,rw:100000,xp:2000},
];

const G={
  money:100,exp:0,level:1,cz:0,totalEarned:0,totalBuilt:0,
  zones:[{unlocked:true,buildings:[]},{unlocked:false,buildings:[]},{unlocked:false,buildings:[]}],
  quests:QD.map(q=>({...q,progress:0,claimed:false})),
  ips:0,lastTick:Date.now()
};
const MAX=20;
const fmt=n=>n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':Math.floor(n).toString();
const inc=(t,lv)=>Math.floor(t.ib*Math.pow(1.35,lv-1));
const upc=(t,lv)=>Math.floor(t.bc*Math.pow(1.55,lv));
const buc=(t,own)=>Math.floor(t.bc*Math.pow(1.4,own));
const expN=lv=>Math.floor(100*Math.pow(1.18,lv-1));
const calcIPS=()=>{let s=0;G.zones.forEach(z=>z.buildings.forEach(b=>{const t=SHOPS.find(x=>x.id===b.id);if(t)s+=inc(t,b.lv);}));return s;};

function addExp(a){
  G.exp+=a;
  while(G.level<100){const n=expN(G.level);if(G.exp>=n){G.exp-=n;G.level++;onLvUp();}else break;}
}
function onLvUp(){
  showNotif(`⭐ เลเวล ${G.level}!`);spkAll();
  ZONES.forEach((z,i)=>{if(G.level>=z.ulv&&!G.zones[i].unlocked){G.zones[i].unlocked=true;showNotif(`🗺️ ปลดล็อค ${z.nm}!`);}});
  updZones();updQuests();scheduleSave();
}

function updHUD(){
  document.getElementById('hM').textContent=fmt(G.money);
  document.getElementById('hL').textContent=G.level;
  const n=G.level<100?expN(G.level):1;
  document.getElementById('eb').style.width=Math.min(100,(G.exp/n)*100)+'%';
  G.ips=calcIPS();
  document.getElementById('ib').textContent=`+${fmt(G.ips)} 💰/วิ`;
}

function updZones(){
  ZONES.forEach((z,i)=>{
    const b=document.getElementById(`z${i}`);
    b.classList.toggle('lk',!G.zones[i].unlocked);
    b.classList.toggle('act',G.cz===i);
    b.textContent=G.zones[i].unlocked?z.nm:`🔒 Lv.${z.ulv}`;
  });
}

function switchZone(i){
  if(!G.zones[i].unlocked){showNotif(`🔒 ต้องการ Lv.${ZONES[i].ulv}`);return;}
  G.cz=i;
  const z=ZONES[i];
  document.getElementById('sky').style.background=z.sky;
  document.getElementById('gnd').style.background=z.gnd;
  document.getElementById('road').style.background=z.rd;
  updZones();renderBuildings();renderShop();
}

// ===== BUILDINGS =====
function renderBuildings(){
  const area=document.getElementById('ca');
  area.innerHTML='';
  const zone=G.zones[G.cz];
  zone.buildings.forEach((b,idx)=>{
    const t=SHOPS.find(x=>x.id===b.id);if(!t)return;
    const lv=b.lv, h=75+lv*13, w=64+lv*3, isMax=lv>=t.mx;
    const uc=upc(t,lv), ca=G.money>=uc;

    const slot=document.createElement('div');slot.className='bs';slot.dataset.idx=idx;

    const body=document.createElement('div');body.className='bb';
    body.style.cssText=`width:${w}px;height:${h}px;background:linear-gradient(170deg,${t.cl}EE,${t.cl}77);border:3px solid ${t.cl};box-shadow:4px 6px 0 rgba(0,0,0,0.25),inset 0 2px 0 rgba(255,255,255,0.3);`;

    const rf=document.createElement('div');rf.className='brf';rf.style.cssText=`background:${t.cl};border:3px solid ${t.cl};`;
    body.appendChild(rf);

    const ws=document.createElement('div');ws.className='bws';
    const wc=Math.min(2+Math.floor(lv/2),12);ws.style.gridTemplateColumns=`repeat(${Math.min(wc,2)},1fr)`;
    for(let i=0;i<wc;i++){const w2=document.createElement('div');w2.className='bw'+(Math.random()>0.35?' lit':'');ws.appendChild(w2);}
    body.appendChild(ws);

    const em=document.createElement('div');em.className='bic';em.textContent=t.e;body.appendChild(em);
    slot.appendChild(body);

    const dg=document.createElement('div');dg.className='bdg';dg.textContent=`+${fmt(inc(t,lv))}/s`;slot.appendChild(dg);
    const lb=document.createElement('div');lb.className='blb';lb.innerHTML=`${t.name}<br>Lv.${lv}`;slot.appendChild(lb);

    const btn=document.createElement('button');
    btn.className='bub'+(isMax?' mx':'');
    btn.dataset.zone=G.cz;btn.dataset.idx=idx;
    if(isMax){btn.textContent='✨ MAX!';btn.disabled=true;}
    else{btn.textContent=`⬆️ ${fmt(uc)}💰`;btn.disabled=!ca;btn.onclick=()=>doUpgrade(G.cz,idx);}
    slot.appendChild(btn);
    area.appendChild(slot);
  });

  if(zone.buildings.length<MAX){
    const e=document.createElement('div');e.className='be';e.textContent='+';area.appendChild(e);
  }
}

// Update only button states without full re-render
function updButtons(){
  document.querySelectorAll('.bub:not(.mx)').forEach(btn=>{
    const zi=parseInt(btn.dataset.zone),bi=parseInt(btn.dataset.idx);
    const b=G.zones[zi]?.buildings[bi];if(!b)return;
    const t=SHOPS.find(x=>x.id===b.id);if(!t)return;
    const uc=upc(t,b.lv);
    btn.disabled=G.money<uc;
    btn.textContent=`⬆️ ${fmt(uc)}💰`;
  });
}

function doUpgrade(zi,bi){
  const zone=G.zones[zi], b=zone.buildings[bi];
  const t=SHOPS.find(x=>x.id===b.id);
  const uc=upc(t,b.lv);
  if(G.money<uc||b.lv>=t.mx){showNotif('💰 เงินไม่พอ!');return;}
  G.money-=uc;b.lv++;
  addExp(20+t.z*15);spkAll();
  showNotif(`⬆️ ${t.name} Lv.${b.lv}!`);
  renderBuildings();updHUD();renderShop();scheduleSave();
}

function renderShop(){
  const g=document.getElementById('sg');g.innerHTML='';
  SHOPS.filter(t=>t.z===G.cz).forEach(t=>{
    const locked=G.level<t.lv;
    const own=G.zones[G.cz].buildings.filter(b=>b.id===t.id).length;
    const cost=buc(t,own);
    const full=G.zones[G.cz].buildings.length>=MAX;
    const ca=G.money>=cost;
    const item=document.createElement('div');
    item.className=locked?'si lk':(!ca||full)?'si cn':'si';
    item.innerHTML=`<div class="se">${t.e}</div><div style="flex:1;min-width:0"><div class="sn">${t.name}</div><div class="sd">${t.ds}</div>${locked?`<div class="slk">🔒 Lv.${t.lv}</div>`:''}</div><div class="sp">${locked?'🔒':fmt(cost)+'💰'}</div>`;
    if(!locked&&ca&&!full)item.onclick=()=>buyBuilding(t);
    g.appendChild(item);
  });
}

function buyBuilding(t){
  const zone=G.zones[G.cz];
  const own=zone.buildings.filter(b=>b.id===t.id).length;
  const cost=buc(t,own);
  if(G.money<cost||zone.buildings.length>=MAX)return;
  G.money-=cost;zone.buildings.push({id:t.id,lv:1});
  G.totalBuilt++;addExp(25+t.z*15);updQuests();
  renderBuildings();renderShop();updHUD();
  startTruck(G.cz,zone.buildings.length-1);
  showNotif(`🏗️ ${t.name}!`);scheduleSave();
}

// TRUCKS - max 3 on road at once
let truckCount=0;
function startTruck(zi,bi){
  const b=G.zones[zi]?.buildings[bi];if(!b)return;
  const t=SHOPS.find(x=>x.id===b.id);
  function go(){
    if(!G.zones[zi]?.buildings[bi])return;
    const lv=G.zones[zi].buildings[bi]?.lv||1;
    // earn even when not current zone
    if(zi!==G.cz){
      const revenue=inc(t,lv);
      G.money+=revenue;G.totalEarned+=revenue;addExp(1);updQuests();
      setTimeout(go,t.ms/lv);return;
    }
    // limit trucks on screen
    if(truckCount>=3){setTimeout(go,2000);return;}
    truckCount++;
    const layer=document.getElementById('tl');
    const tk=document.createElement('div');tk.className='tk';tk.textContent=t.tr;
    const dur=3+Math.random()*2;
    tk.style.cssText=`animation-duration:${dur}s;bottom:${4+Math.random()*18}px;`;
    layer.appendChild(tk);
    setTimeout(()=>{
      const b2=G.zones[zi]?.buildings[bi];if(!b2)return;
      const revenue=inc(t,b2.lv);
      G.money+=revenue;G.totalEarned+=revenue;addExp(1);updQuests();
      const coin=document.createElement('div');coin.className='fc';
      coin.textContent=`+${fmt(revenue)}💰`;
      coin.style.cssText=`left:${25+Math.random()*50}%;top:36%;`;
      document.getElementById('gw').appendChild(coin);
      setTimeout(()=>coin.remove(),1000);
      updHUD();
    },dur*450);
    setTimeout(()=>{tk.remove();truckCount=Math.max(0,truckCount-1);},dur*1000+200);
    const lv2=G.zones[zi]?.buildings[bi]?.lv||1;
    setTimeout(go,t.ms/lv2);
  }
  setTimeout(go,500+Math.random()*3000);
}

// QUESTS
function updQuests(){
  G.quests.forEach(q=>{
    if(q.claimed)return;
    if(q.tp==='earn')q.progress=Math.min(q.tg,G.totalEarned);
    if(q.tp==='build')q.progress=Math.min(q.tg,G.totalBuilt);
    if(q.tp==='level')q.progress=Math.min(q.tg,G.level);
    if(q.tp==='zone')q.progress=Math.min(q.tg,G.zones.filter(z=>z.unlocked).length-1);
  });
}
function renderQuests(){
  updQuests();
  const l=document.getElementById('ql');l.innerHTML='';
  G.quests.forEach(q=>{
    const pct=Math.min(100,(q.progress/q.tg)*100);
    const done=q.progress>=q.tg;
    const d=document.createElement('div');d.className='qi';
    d.innerHTML=`<div class="qt">${q.claimed?'✅':''} ${q.t}</div><div class="qd">${q.d} (${fmt(q.progress)}/${fmt(q.tg)})</div><div class="qp"><div class="qf" style="width:${pct}%"></div></div><div class="qr">🎁 ${fmt(q.rw)}💰 + ${q.xp} EXP</div>${done&&!q.claimed?`<button class="qc" onclick="claimQ('${q.id}')">รับรางวัล!</button>`:''}${q.claimed?'<div style="font-size:10px;color:#bbb;margin-top:2px">รับแล้ว ✓</div>':''}`;
    l.appendChild(d);
  });
}
function claimQ(id){
  const q=G.quests.find(x=>x.id===id);if(!q||q.claimed||q.progress<q.tg)return;
  q.claimed=true;G.money+=q.rw;addExp(q.xp);
  showNotif(`🎁 ${fmt(q.rw)}💰!`);spkAll();updHUD();renderQuests();scheduleSave();
}

// TABS & TOGGLE
let shopOpen=true;
function toggleShop(){
  shopOpen=!shopOpen;
  const p=document.getElementById('panels');
  p.className=shopOpen?'open':'closed';
  document.getElementById('toggle-shop').textContent=shopOpen?'🔼':'🔽';
}
function switchTab(name,el){
  document.querySelectorAll('.pn').forEach(p=>p.classList.remove('act'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('act'));
  document.getElementById(`pn-${name}`).classList.add('act');
  el.classList.add('act');
  if(!shopOpen){shopOpen=true;document.getElementById('panels').className='open';document.getElementById('toggle-shop').textContent='🔼';}
  if(name==='quest')renderQuests();
  if(name==='info')renderStats();
}
function renderStats(){
  const tb=G.zones.reduce((s,z)=>s+z.buildings.length,0);
  document.getElementById('stx').innerHTML=`🏙️ โซน: ${G.zones.filter(z=>z.unlocked).length}/3<br>🏗️ อาคาร: ${tb}<br>💰 รายได้/วิ: ${fmt(G.ips)}<br>📊 สะสม: ${fmt(G.totalEarned)}<br>⭐ เลเวล: ${G.level}/100<br>📋 ภารกิจ: ${G.quests.filter(q=>q.claimed).length}/${G.quests.length}`;
}

// FX
let nT;
function showNotif(tx){
  document.querySelector('.nf')?.remove();
  if(nT)clearTimeout(nT);
  const n=document.createElement('div');n.className='nf';n.textContent=tx;
  document.body.appendChild(n);nT=setTimeout(()=>n.remove(),2000);
}
function spkAll(){
  const cx=window.innerWidth/2,cy=window.innerHeight*0.42;
  for(let i=0;i<8;i++){
    const s=document.createElement('div');s.className='sp2';
    const a=(i/8)*Math.PI*2,d=45+Math.random()*45;
    s.style.cssText=`left:${cx}px;top:${cy}px;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;animation-delay:${Math.random()*0.2}s`;
    s.textContent=['⭐','✨','💫','🌟'][Math.floor(Math.random()*4)];
    document.body.appendChild(s);setTimeout(()=>s.remove(),1100);
  }
}

// CLOUDS
for(let i=0;i<5;i++){
  const c=document.createElement('div');c.className='cloud';
  c.style.cssText=`width:${45+Math.random()*80}px;height:${12+Math.random()*20}px;top:${2+Math.random()*22}%;animation-duration:${22+Math.random()*20}s;animation-delay:${-Math.random()*22}s;`;
  document.getElementById('sky').appendChild(c);
}

// TICK
function tick(){
  const now=Date.now(),dt=(now-G.lastTick)/1000;G.lastTick=now;
  G.money+=G.ips*dt*0.25;G.totalEarned+=G.ips*dt*0.25;
  updHUD();updButtons(); // update button states every tick
}

function startGame(){
  switchZone(0);
  if(G.zones[0].buildings.length===0){G.zones[0].buildings.push({id:'farm',lv:1});G.totalBuilt=1;}
  G.zones.forEach((zone,zi)=>zone.buildings.forEach((_,bi)=>startTruck(zi,bi)));
  renderBuildings();renderShop();updHUD();updZones();updQuests();
  setInterval(tick,500);
  setInterval(renderShop,3000);
  setInterval(()=>saveGame(false),30000);
}
</script>
</body>
</html>
