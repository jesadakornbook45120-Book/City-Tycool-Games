<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏙️ City Tycool</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
:root{--orange:#FF7A00;--gold:#FFD700;--panel:rgba(255,255,255,0.97);--shadow:0 4px 20px rgba(0,0,0,0.2);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;overflow:hidden;height:100vh;user-select:none;background:#87CEEB;}
#game-wrap{width:100vw;height:100vh;position:relative;overflow:hidden;}

/* SKY / GROUND */
#sky{position:absolute;top:0;left:0;right:0;height:42%;z-index:0;transition:background 1s;}
#ground{position:absolute;bottom:0;left:0;right:0;height:60%;z-index:1;transition:background 1s;}
#road{position:absolute;bottom:130px;left:0;right:0;height:55px;z-index:3;}
#road::before{content:'';position:absolute;top:50%;left:0;right:0;height:4px;background:repeating-linear-gradient(90deg,#FFD700 0,#FFD700 40px,transparent 40px,transparent 80px);transform:translateY(-50%);}
.cloud{position:absolute;background:white;border-radius:50px;opacity:0.8;animation:floatCloud linear infinite;}
@keyframes floatCloud{from{transform:translateX(-250px)}to{transform:translateX(110vw)}}

/* CITY */
#city-area{position:absolute;bottom:185px;left:0;right:0;min-height:280px;z-index:2;display:flex;align-items:flex-end;padding:0 8px;gap:8px;overflow-x:auto;overflow-y:visible;}
#city-area::-webkit-scrollbar{display:none;}
.bslot{position:relative;display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.bslot:hover .bbuilding{filter:brightness(1.1);}
.bbuilding{position:relative;border-radius:8px 8px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:4px;cursor:pointer;transition:all 0.3s;}
.broof{position:absolute;top:-18px;left:-4px;right:-4px;height:22px;border-radius:6px 6px 0 0;}
.bwins{position:absolute;top:8px;left:6px;right:6px;display:grid;gap:3px;}
.bwin{background:rgba(255,255,255,0.7);border-radius:2px;height:7px;}
.bwin.lit{background:#FFE066;animation:blink 3s infinite;}
@keyframes blink{0%,90%,100%{opacity:1}95%{opacity:0.3}}
.bemoji{font-size:20px;position:relative;z-index:2;}
.blabel{font-family:'Fredoka One',cursive;font-size:10px;color:white;text-shadow:1px 1px 2px rgba(0,0,0,0.6);margin-top:3px;text-align:center;line-height:1.2;}
.bbadge{position:absolute;top:-10px;right:-8px;background:#FFD700;border:2px solid #FF8C00;border-radius:10px;padding:1px 5px;font-size:9px;font-weight:800;color:#333;font-family:'Fredoka One',cursive;white-space:nowrap;}
.bupbtn{background:linear-gradient(135deg,#44BB44,#2E8B2E);border:2px solid #1A5C1A;border-radius:10px;padding:4px 8px;color:white;font-family:'Fredoka One',cursive;font-size:11px;cursor:pointer;box-shadow:0 3px 0 #1A5C1A;margin-top:3px;white-space:nowrap;}
.bupbtn:disabled{background:linear-gradient(135deg,#888,#555);border-color:#333;box-shadow:0 3px 0 #333;cursor:not-allowed;}
.bupbtn:active{transform:translateY(2px);box-shadow:0 1px 0 #1A5C1A;}
.bempty{width:65px;height:75px;border:3px dashed #aaa;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:28px;opacity:0.35;align-self:flex-end;flex-shrink:0;}
.blockedslot{width:65px;height:75px;border:3px dashed #888;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0.5;align-self:flex-end;flex-shrink:0;background:rgba(0,0,0,0.1);}

/* TRUCKS */
#trucks{position:absolute;bottom:130px;left:0;right:0;height:55px;z-index:10;pointer-events:none;}
.truck{position:absolute;font-size:26px;bottom:6px;animation:drive linear;filter:drop-shadow(2px 2px 2px rgba(0,0,0,0.3));}
@keyframes drive{0%{left:-80px}100%{left:110%}}
.fcoin{position:absolute;font-size:16px;pointer-events:none;animation:floatUp 1s ease-out forwards;z-index:200;white-space:nowrap;}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-70px) scale(1.2);opacity:0}}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:100;padding:8px 12px;display:flex;gap:8px;align-items:center;background:linear-gradient(180deg,rgba(0,0,0,0.5),transparent);}
.hbox{background:var(--panel);border-radius:18px;padding:5px 12px;display:flex;align-items:center;gap:5px;box-shadow:var(--shadow);border:2px solid rgba(255,255,255,0.8);}
.hval{font-family:'Fredoka One',cursive;font-size:16px;color:#333;min-width:50px;}
.hlbl{font-size:10px;color:#888;font-weight:700;}
#zone-bar{position:fixed;top:58px;left:0;right:0;z-index:100;display:flex;justify-content:center;gap:8px;padding:4px;}
.zone-btn{font-family:'Fredoka One',cursive;font-size:12px;padding:4px 14px;border-radius:20px;border:2px solid rgba(255,255,255,0.5);cursor:pointer;transition:all 0.2s;color:white;text-shadow:1px 1px 2px rgba(0,0,0,0.5);}
.zone-btn.active{transform:scale(1.1);border-color:white;box-shadow:0 4px 15px rgba(0,0,0,0.3);}
.zone-btn.locked{opacity:0.4;cursor:not-allowed;}
#ips-badge{position:fixed;top:58px;right:12px;background:rgba(0,0,0,0.55);color:#FFD700;font-family:'Fredoka One',cursive;font-size:12px;padding:3px 10px;border-radius:20px;z-index:100;}

/* BOTTOM TABS */
#bottom-wrap{position:fixed;bottom:0;left:0;right:0;z-index:100;}
#tab-bar{display:flex;background:rgba(255,255,255,0.95);border-top:2px solid #eee;}
.tab{flex:1;padding:8px 4px;text-align:center;cursor:pointer;font-family:'Fredoka One',cursive;font-size:12px;color:#888;border:none;background:none;transition:all 0.2s;}
.tab.active{color:#9966FF;border-top:3px solid #9966FF;}
#panels{background:var(--panel);border-radius:20px 20px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,0.15);max-height:200px;overflow-y:auto;}
.panel{display:none;padding:12px;}
.panel.active{display:block;}
.panel-title{font-family:'Fredoka One',cursive;font-size:15px;color:#333;margin-bottom:8px;}
.sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
.sitem{background:linear-gradient(135deg,#f8f9ff,#eef0ff);border:2px solid #dde0ff;border-radius:12px;padding:8px 10px;display:flex;align-items:center;gap:7px;cursor:pointer;transition:all 0.15s;}
.sitem:hover{transform:scale(1.02);border-color:#9966FF;}
.sitem.cant{opacity:0.5;cursor:not-allowed;}
.sitem.locked-item{opacity:0.4;cursor:not-allowed;background:linear-gradient(135deg,#eee,#ddd);}
.semoji{font-size:22px;}
.sinfo{flex:1;min-width:0;}
.sname{font-family:'Fredoka One',cursive;font-size:12px;color:#333;}
.sdesc{font-size:9px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sprice{font-family:'Fredoka One',cursive;font-size:12px;color:var(--orange);white-space:nowrap;}
.slocked{font-size:9px;color:#999;}

/* QUEST panel */
.qitem{background:linear-gradient(135deg,#fff9e6,#fff3cc);border:2px solid #FFD700;border-radius:12px;padding:10px;margin-bottom:7px;}
.qtitle{font-family:'Fredoka One',cursive;font-size:13px;color:#333;}
.qdesc{font-size:11px;color:#888;margin:2px 0;}
.qprog{background:#eee;border-radius:10px;height:8px;overflow:hidden;margin:4px 0;}
.qfill{background:linear-gradient(90deg,#FFD700,#FF8C00);height:100%;border-radius:10px;transition:width 0.5s;}
.qreward{font-family:'Fredoka One',cursive;font-size:11px;color:#FF8C00;}
.qclaim{background:linear-gradient(135deg,#FFD700,#FF8C00);border:none;border-radius:8px;padding:4px 12px;font-family:'Fredoka One',cursive;font-size:12px;color:white;cursor:pointer;margin-top:4px;}

/* NOTIF */
.notif{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:linear-gradient(135deg,#FFD700,#FF8C00);border-radius:20px;padding:16px 32px;font-family:'Fredoka One',cursive;font-size:22px;color:white;text-shadow:2px 2px 4px rgba(0,0,0,0.3);z-index:500;box-shadow:0 10px 40px rgba(255,140,0,0.5);animation:popIn 2s ease forwards;text-align:center;pointer-events:none;}
@keyframes popIn{0%{transform:translate(-50%,-50%) scale(0);opacity:0}20%{transform:translate(-50%,-50%) scale(1.08);opacity:1}80%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(0.8);opacity:0}}
.sparkle{position:fixed;font-size:18px;pointer-events:none;animation:spk 0.9s ease-out forwards;z-index:400;}
@keyframes spk{0%{transform:translate(0,0) scale(0);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(1);opacity:0}}

/* LOGIN */
#login{position:fixed;inset:0;z-index:999;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
#login h1{font-family:'Fredoka One',cursive;font-size:44px;color:#FFD700;text-shadow:0 0 30px rgba(255,215,0,0.6);}
#login p{color:#aaa;font-size:15px;}
#gbtn{background:white;border:none;border-radius:16px;padding:13px 26px;font-family:'Fredoka One',cursive;font-size:17px;color:#333;cursor:pointer;display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,0.4);transition:all 0.2s;}
#gbtn:hover{transform:scale(1.05);}
#ubar{position:fixed;top:8px;right:10px;z-index:200;display:none;align-items:center;gap:6px;}
#uavatar{width:28px;height:28px;border-radius:50%;border:2px solid white;}
#uname{font-family:'Fredoka One',cursive;font-size:12px;color:white;text-shadow:1px 1px 3px rgba(0,0,0,0.6);}
#logoutbtn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:8px;padding:2px 7px;color:white;font-size:10px;cursor:pointer;}
#saveindicator{position:fixed;bottom:215px;right:12px;background:rgba(0,170,0,0.85);color:white;font-family:'Fredoka One',cursive;font-size:11px;padding:3px 10px;border-radius:20px;z-index:150;display:none;}
</style>
</head>
<body>

<div id="login">
  <div style="font-size:72px">🏙️</div>
  <h1>City Tycool</h1>
  <p>สร้างอาณาจักรธุรกิจของคุณ!</p>
  <button id="gbtn"><img src="https://www.google.com/favicon.ico" style="width:22px">เข้าสู่ระบบด้วย Google</button>
  <p style="font-size:11px;color:#555">เซฟข้อมูลอัตโนมัติ ✨</p>
</div>

<div id="ubar">
  <img id="uavatar" src="" alt="">
  <span id="uname"></span>
  <button id="logoutbtn">ออก</button>
</div>
<div id="saveindicator">💾 บันทึกแล้ว!</div>

<div id="game-wrap">
  <div id="sky"></div>
  <div id="ground"></div>
  <div id="road"></div>
  <div id="city-area"></div>
  <div id="trucks"></div>
</div>

<div id="hud">
  <div class="hbox"><span style="font-size:18px">💰</span><div><div class="hval" id="hMoney">0</div><div class="hlbl">เหรียญ</div></div></div>

      <div style="background:#eee;border-radius:8px;height:7px;margin-top:2px;overflow:hidden"><div id="expbar" style="background:linear-gradient(90deg,#9966FF,#FF66CC);height:100%;width:0%;border-radius:8px;transition:width 0.3s"></div></div>

  </div>
</div>

<div id="zone-bar">

  <button class="zone-btn locked" style="background:linear-gradient(135deg,#2196F3,#1565C0)" id="zbtn1" onclick="switchZone(1)">🏙️ เมืองใหญ่</button>
  <button class="zone-btn locked" style="background:linear-gradient(135deg,#9C27B0,#6A1B9A)" id="zbtn2" onclick="switchZone(2)">🌆 มหานคร</button>
</div>
<div id="ips-badge">+0 💰/วิ</div>

<div id="bottom-wrap">
  <div id="panels">
    <div class="panel active" id="panel-shop">
      <div class="panel-title">🏗️ สร้าง / อัพเกรด</div>
      <div class="sgrid" id="shopgrid"></div>
    </div>
    <div class="panel" id="panel-quest">
      <div class="panel-title">📋 ภารกิจ</div>
      <div id="questlist"></div>
    </div>
    <div class="panel" id="panel-info">
      <div class="panel-title">📊 สถิติ</div>
      <div id="statsinfo" style="font-size:12px;color:#555;line-height:1.8"></div>
    </div>
  </div>
  <div id="tab-bar">
    <button class="tab active" onclick="switchTab('shop')">🏗️ สร้าง</button>
    <button class="tab" onclick="switchTab('quest')">📋 ภารกิจ</button>
    <button class="tab" onclick="switchTab('info')">📊 สถิติ</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
// ===== FIREBASE =====
firebase.initializeApp({
  apiKey:"AIzaSyASRB9Ved_Va_OoAXIpc1glavQ-cMmAs74",
  authDomain:"book-classic.firebaseapp.com",
  projectId:"book-classic",
  storageBucket:"book-classic.firebasestorage.app",
  messagingSenderId:"402719934660",
  appId:"1:402719934660:web:b59916175365e60637a191"
});
const auth=firebase.auth(), db=firebase.firestore();
let currentUser=null, gameStarted=false, saveTimeout=null;

document.getElementById('gbtn').onclick=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>alert(e.message));
document.getElementById('logoutbtn').onclick=()=>auth.signOut().then(()=>location.reload());

auth.onAuthStateChanged(async user=>{
  if(user){
    currentUser=user;
    document.getElementById('login').style.display='none';
    document.getElementById('ubar').style.display='flex';
    document.getElementById('uavatar').src=user.photoURL||'';
    document.getElementById('uname').textContent=user.displayName?.split(' ')[0]||'ผู้เล่น';
    if(!gameStarted){await loadGame();startGame();gameStarted=true;}
  }else document.getElementById('login').style.display='flex';
});

async function saveGame(){
  if(!currentUser)return;
  try{
    await db.collection('saves').doc(currentUser.uid).set({
      money:G.money,exp:G.exp,level:G.level,
      zones:G.zones.map(z=>({buildings:z.buildings,unlocked:z.unlocked})),
      quests:G.quests.map(q=>({id:q.id,progress:q.progress,claimed:q.claimed})),
      totalEarned:G.totalEarned,totalBuilt:G.totalBuilt,savedAt:new Date().toISOString()
    });
    const s=document.getElementById('saveindicator');
    s.style.display='block';setTimeout(()=>s.style.display='none',2000);
  }catch(e){console.error(e);}
}
async function loadGame(){
  if(!currentUser)return;
  try{
    const snap=await db.collection('saves').doc(currentUser.uid).get();
    if(snap.exists){
      const d=snap.data();
      G.money=d.money||100; G.exp=d.exp||0; G.level=d.level||1;
      G.totalEarned=d.totalEarned||0; G.totalBuilt=d.totalBuilt||0;
      if(d.zones){
        d.zones.forEach((z,i)=>{if(G.zones[i]){G.zones[i].buildings=z.buildings||[];G.zones[i].unlocked=z.unlocked??false;}});
        G.zones[0].unlocked=true;
      }
      if(d.quests){
        d.quests.forEach(sq=>{const q=G.quests.find(x=>x.id===sq.id);if(q){q.progress=sq.progress||0;q.claimed=sq.claimed||false;}});
      }
      showNotif('🔄 โหลดข้อมูลแล้ว!');
    }
  }catch(e){console.error(e);}
}
function scheduleSave(){if(saveTimeout)clearTimeout(saveTimeout);saveTimeout=setTimeout(saveGame,3000);}

  {id:'tavern',name:'🍺 โรงเหล้า',emoji:'🍺',zone:0,unlockLv:10,baseCost:900,incomeBase:40,color:'#FF5722',truck:'🚐',truckMs:8000,desc:'ขายเครื่องดื่ม',maxLv:20},

  // Zone 2 - มหานคร
  {id:'spaceport',name:'🚀 ท่าอวกาศ',emoji:'🚀',zone:2,unlockLv:55,baseCost:300000,incomeBase:4000,color:'#1A237E',truck:'🚀',truckMs:5000,desc:'ขนส่งอวกาศ',maxLv:20},
  {id:'casino',name:'🎰 คาสิโน',emoji:'🎰',zone:2,unlockLv:60,baseCost:500000,incomeBase:6500,color:'#880E4F',truck:'🚌',truckMs:5500,desc:'บันเทิงระดับโลก',maxLv:20},
  {id:'research',name:'🔬 ศูนย์วิจัย',emoji:'🔬',zone:2,unlockLv:65,baseCost:800000,incomeBase:10000,color:'#00695C',truck:'🚐',truckMs:6000,desc:'วิจัยและพัฒนา',maxLv:20},
  {id:'arcology',name:'🌐 อาคารอัจฉริยะ',emoji:'🌐',zone:2,unlockLv:72,baseCost:1500000,incomeBase:16000,color:'#4527A0',truck:'🚛',truckMs:6000,desc:'เมืองในอาคาร',maxLv:20},
  {id:'fusion',name:'☢️ โรงงานฟิวชัน',emoji:'☢️',zone:2,unlockLv:80,baseCost:3000000,incomeBase:28000,color:'#B71C1C',truck:'🚌',truckMs:6500,desc:'พลังงานนิวเคลียร์',maxLv:20},
  {id:'quantum',name:'💎 คอมพิวเตอร์ควอนตัม',emoji:'💎',zone:2,unlockLv:90,baseCost:6000000,incomeBase:50000,color:'#006064',truck:'🚐',truckMs:7000,desc:'เทคโนโลยีแห่งอนาคต',maxLv:20},
  {id:'dyson',name:'🌟 ไดสัน สเฟียร์',emoji:'🌟',zone:2,unlockLv:100,baseCost:20000000,incomeBase:120000,color:'#E65100',truck:'🚀',truckMs:5000,desc:'เก็บเกี่ยวพลังงานดาว',maxLv:20},
];

const ZONES=[
  {id:0,name:'🌿 เมืองเล็ก',unlockLv:1,sky:'linear-gradient(180deg,#6BB8E8,#ADE4FF)',ground:'linear-gradient(180deg,#7BC47F,#5DBB63 30%,#4CAF50)',road:'#7B7B7B'},
  {id:1,name:'🏙️ เมืองใหญ่',unlockLv:20,sky:'linear-gradient(180deg,#546E7A,#78909C)',ground:'linear-gradient(180deg,#616161,#424242 30%,#212121)',road:'#424242'},
  {id:2,name:'🌆 มหานคร',unlockLv:55,sky:'linear-gradient(180deg,#1A237E,#283593)',ground:'linear-gradient(180deg,#1B1B2F,#16213e 30%,#0f3460)',road:'#1B1B2F'},
];

// EXP required per level (100 levels)
function expNeeded(lv){return Math.floor(100*Math.pow(1.18,lv-1));}

// QUESTS
const QUEST_DEFS=[
  {id:'q_earn1',title:'💰 นักสะสม I',desc:'หาเงิน 1,000 เหรียญ',type:'earn',target:1000,reward:200,expReward:50},
  {id:'q_earn2',title:'💰 นักสะสม II',desc:'หาเงิน 50,000 เหรียญ',type:'earn',target:50000,reward:5000,expReward:200},
  {id:'q_earn3',title:'💰 เศรษฐี',desc:'หาเงิน 1,000,000 เหรียญ',type:'earn',target:1000000,reward:50000,expReward:500},
  {id:'q_build1',title:'🏗️ ผู้สร้าง I',desc:'สร้างอาคาร 3 หลัง',type:'build',target:3,reward:300,expReward:80},
  {id:'q_build2',title:'🏗️ ผู้สร้าง II',desc:'สร้างอาคาร 10 หลัง',type:'build',target:10,reward:2000,expReward:300},
  {id:'q_build3',title:'🏗️ สถาปนิก',desc:'สร้างอาคาร 25 หลัง',type:'build',target:25,reward:20000,expReward:800},
  {id:'q_lv10',title:'⭐ เส้นทางนักธุรกิจ',desc:'ถึงเลเวล 10',type:'level',target:10,reward:1000,expReward:100},
  {id:'q_lv25',title:'⭐ นักธุรกิจมือโปร',desc:'ถึงเลเวล 25',type:'level',target:25,reward:10000,expReward:400},
  {id:'q_lv50',title:'⭐ อัจฉริยะธุรกิจ',desc:'ถึงเลเวล 50',type:'level',target:50,reward:200000,expReward:2000},
  {id:'q_zone1',title:'🏙️ ขยายเมือง',desc:'ปลดล็อคเมืองใหญ่',type:'zone',target:1,reward:5000,expReward:500},
  {id:'q_zone2',title:'🌆 มหานคร',desc:'ปลดล็อคมหานคร',type:'zone',target:2,reward:100000,expReward:2000},
];

// ===== GAME STATE =====
const G={
  money:100, exp:0, level:1,
  currentZone:0, totalEarned:0, totalBuilt:0,
  zones:[
    {id:0,unlocked:true,buildings:[]},
    {id:1,unlocked:false,buildings:[]},
    {id:2,unlocked:false,buildings:[]},
  ],
  quests:QUEST_DEFS.map(q=>({...q,progress:0,claimed:false})),
  ips:0, lastTick:Date.now(),
};

const MAX_PER_ZONE=12;
const fmt=n=>n>=1e9?(n/1e9).toFixed(2)+'B':n>=1e6?(n/1e6).toFixed(2)+'M':n>=1e3?(n/1e3).toFixed(1)+'K':Math.floor(n).toString();
const getIncome=(t,lv)=>Math.floor(t.incomeBase*Math.pow(1.35,lv-1));
const getUpCost=(t,lv)=>Math.floor(t.baseCost*Math.pow(1.55,lv));
const getBuyCost=(t,own)=>Math.floor(t.baseCost*Math.pow(1.4,own));

function calcIPS(){
  let s=0;
  G.zones.forEach(z=>z.buildings.forEach(b=>{
    const t=SHOP_TYPES.find(x=>x.id===b.type);
    if(t)s+=getIncome(t,b.level);
  }));
  return s;
}

function addExp(amt){
  G.exp+=amt;
  while(G.level<100){
    const need=expNeeded(G.level);
    if(G.exp>=need){G.exp-=need;G.level++;onLevelUp();}else break;
  }
}

function onLevelUp(){
  showNotif(`⭐ เลเวล ${G.level}!`);
  spawnSparkles();
  // Unlock zones
  ZONES.forEach((z,i)=>{
    if(G.level>=z.unlockLv && !G.zones[i].unlocked){
      G.zones[i].unlocked=true;
      showNotif(`🗺️ ปลดล็อค ${z.name}!`);
    }
  });
  updateZoneBar();
  updateQuests();
  scheduleSave();
}

function updateHUD(){
  document.getElementById('hMoney').textContent=fmt(G.money);
  document.getElementById('hLevel').textContent=G.level;
  const need=G.level<100?expNeeded(G.level):1;
  document.getElementById('expbar').style.width=Math.min(100,(G.exp/need)*100)+'%';
  G.ips=calcIPS();
  document.getElementById('ips-badge').textContent=`+${fmt(G.ips)} 💰/วิ`;
}

function updateZoneBar(){
  ZONES.forEach((z,i)=>{
    const btn=document.getElementById(`zbtn${i}`);
    const unlocked=G.zones[i].unlocked;
    btn.classList.toggle('locked',!unlocked);
    btn.classList.toggle('active',G.currentZone===i);
    btn.textContent=unlocked?z.name:`🔒 Lv.${z.unlockLv}`;
  });
}

function switchZone(idx){
  if(!G.zones[idx].unlocked){showNotif(`🔒 ต้องการเลเวล ${ZONES[idx].unlockLv}`);return;}
  G.currentZone=idx;
  const z=ZONES[idx];
  document.getElementById('sky').style.background=z.sky;
  document.getElementById('ground').style.background=z.ground;
  document.getElementById('road').style.background=z.road;
  updateZoneBar();
  renderBuildings();
  renderShop();
}

// ===== BUILDINGS =====
function renderBuildings(){
  const area=document.getElementById('city-area');
  area.innerHTML='';
  const zone=G.zones[G.currentZone];

  zone.buildings.forEach((b,idx)=>{
    const type=SHOP_TYPES.find(t=>t.id===b.type);
    if(!type)return;
    const lv=b.level, h=60+lv*12, w=62+lv*3;
    const slot=document.createElement('div');
    slot.className='bslot'; slot.id=`bs-${G.currentZone}-${idx}`;

    const body=document.createElement('div');
    body.className='bbuilding';
    body.style.cssText=`width:${w}px;height:${h}px;background:linear-gradient(170deg,${type.color}EE,${type.color}77);border:3px solid ${type.color};box-shadow:4px 4px 0 rgba(0,0,0,0.2),inset 0 2px 0 rgba(255,255,255,0.3);`;

    const roof=document.createElement('div');
    roof.className='broof';
    roof.style.cssText=`background:${type.color};border:3px solid ${type.color};`;
    body.appendChild(roof);

    const wins=document.createElement('div');
    wins.className='bwins';
    const wc=Math.min(2+Math.floor(lv/2),10);
    wins.style.gridTemplateColumns=`repeat(${Math.min(wc,2)},1fr)`;
    for(let i=0;i<wc;i++){const w2=document.createElement('div');w2.className='bwin'+(Math.random()>0.35?' lit':'');wins.appendChild(w2);}
    body.appendChild(wins);

    const em=document.createElement('div');em.className='bemoji';em.textContent=type.emoji;
    body.appendChild(em);
    slot.appendChild(body);

    const badge=document.createElement('div');badge.className='bbadge';
    badge.textContent=`+${fmt(getIncome(type,lv))}/s`;
    slot.appendChild(badge);

    const label=document.createElement('div');label.className='blabel';
    label.innerHTML=`${type.name}<br>Lv.${lv}`;
    slot.appendChild(label);

    if(lv<type.maxLv){
      const uc=getUpCost(type,lv);
      const btn=document.createElement('button');btn.className='bupbtn';
      btn.textContent=`⬆️ ${fmt(uc)}💰`;btn.disabled=G.money<uc;
      btn.onclick=(e)=>{e.stopPropagation();upgradeBuilding(G.currentZone,idx);};
      slot.appendChild(btn);
    }else{
      const ml=document.createElement('div');ml.style.cssText='font-family:"Fredoka One",cursive;font-size:10px;color:#FFD700;margin-top:3px;';ml.textContent='✨ MAX!';slot.appendChild(ml);
    }
    area.appendChild(slot);
  });

  if(zone.buildings.length<MAX_PER_ZONE){
    const e=document.createElement('div');e.className='bempty';e.textContent='+';area.appendChild(e);
  }
}

function renderShop(){
  const grid=document.getElementById('shopgrid');grid.innerHTML='';
  const zoneTypes=SHOP_TYPES.filter(t=>t.zone===G.currentZone);
  const zone=G.zones[G.currentZone];

  zoneTypes.forEach(type=>{
    const locked=G.level<type.unlockLv;
    const own=zone.buildings.filter(b=>b.type===type.id).length;
    const cost=getBuyCost(type,own);
    const maxed=zone.buildings.length>=MAX_PER_ZONE;
    const canAfford=G.money>=cost;

    const item=document.createElement('div');
    if(locked)item.className='sitem locked-item';
    else if(!canAfford||maxed)item.className='sitem cant';
    else item.className='sitem';

    item.innerHTML=`<div class="semoji">${type.emoji}</div><div class="sinfo"><div class="sname">${type.name}</div><div class="sdesc">${type.desc}</div>${locked?`<div class="slocked">🔒 ต้องการ Lv.${type.unlockLv}</div>`:''}</div><div class="sprice">${locked?'🔒':fmt(cost)+'💰'}</div>`;
    if(!locked&&canAfford&&!maxed)item.onclick=()=>buyBuilding(type);
    grid.appendChild(item);
  });
}

function buyBuilding(type){
  const zone=G.zones[G.currentZone];
  const own=zone.buildings.filter(b=>b.type===type.id).length;
  const cost=getBuyCost(type,own);
  if(G.money<cost||zone.buildings.length>=MAX_PER_ZONE)return;
  G.money-=cost;
  zone.buildings.push({type:type.id,level:1});
  G.totalBuilt++;
  addExp(25+type.zone*15);
  updateQuests();
  renderBuildings();renderShop();updateHUD();
  startTruck(G.currentZone,zone.buildings.length-1);
  showNotif(`🏗️ สร้าง ${type.name}!`);
  scheduleSave();
}

function upgradeBuilding(zoneIdx,idx){
  const zone=G.zones[zoneIdx];
  const b=zone.buildings[idx];
  const type=SHOP_TYPES.find(t=>t.id===b.type);
  const cost=getUpCost(type,b.level);
  if(G.money<cost||b.level>=type.maxLv)return;
  G.money-=cost;b.level++;
  addExp(15+b.level*5+type.zone*20);
  const el=document.getElementById(`bs-${zoneIdx}-${idx}`);
  if(el)sparkAt(el);
  renderBuildings();renderShop();updateHUD();
  showNotif(`⬆️ ${type.name} Lv.${b.level}!`);
  scheduleSave();
}

// ===== TRUCKS =====
function startTruck(zoneIdx,bIdx){
  const zone=G.zones[zoneIdx];
  const b=zone.buildings[bIdx];if(!b)return;
  const type=SHOP_TYPES.find(t=>t.id===b.type);
  function go(){
    if(!G.zones[zoneIdx]?.buildings[bIdx])return;
    if(zoneIdx!==G.currentZone){setTimeout(go,type.truckMs/zone.buildings[bIdx].level);return;}
    const layer=document.getElementById('trucks');
    const truck=document.createElement('div');truck.className='truck';truck.textContent=type.truck;
    const dur=2.5+Math.random()*2;truck.style.animationDuration=dur+'s';
    truck.style.bottom=(5+Math.random()*25)+'px';
    layer.appendChild(truck);
    setTimeout(()=>{
      const b2=G.zones[zoneIdx]?.buildings[bIdx];if(!b2)return;
      const inc=getIncome(type,b2.level);
      G.money+=inc;G.totalEarned+=inc;
      addExp(1);updateQuests();
      const coin=document.createElement('div');coin.className='fcoin';
      coin.textContent=`+${fmt(inc)}💰`;
      coin.style.left=(30+Math.random()*40)+'%';coin.style.top='40%';
      document.getElementById('game-wrap').appendChild(coin);
      setTimeout(()=>coin.remove(),1000);
      updateHUD();renderShop();renderBuildings();
    },dur*450);
    setTimeout(()=>truck.remove(),dur*1000+300);
    const b3=G.zones[zoneIdx]?.buildings[bIdx];
    if(b3)setTimeout(go,type.truckMs/Math.max(1,b3.level));
  }
  setTimeout(go,300+Math.random()*2500);
}

// ===== QUESTS =====
function updateQuests(){
  G.quests.forEach(q=>{
    if(q.claimed)return;
    if(q.type==='earn')q.progress=Math.min(q.target,G.totalEarned);
    if(q.type==='build')q.progress=Math.min(q.target,G.totalBuilt);
    if(q.type==='level')q.progress=Math.min(q.target,G.level);
    if(q.type==='zone')q.progress=Math.min(q.target,G.zones.filter(z=>z.unlocked).length-1);
  });
  renderQuests();
}

function renderQuests(){
  const list=document.getElementById('questlist');list.innerHTML='';
  G.quests.forEach(q=>{
    const pct=Math.min(100,(q.progress/q.target)*100);
    const done=q.progress>=q.target;
    const div=document.createElement('div');div.className='qitem';
    div.innerHTML=`
      <div class="qtitle">${q.claimed?'✅ ':''} ${q.title}</div>
      <div class="qdesc">${q.desc} (${fmt(q.progress)}/${fmt(q.target)})</div>
      <div class="qprog"><div class="qfill" style="width:${pct}%"></div></div>
      <div class="qreward">🎁 รางวัล: ${fmt(q.reward)}💰 + ${q.expReward} EXP</div>
      ${done&&!q.claimed?`<button class="qclaim" onclick="claimQuest('${q.id}')">รับรางวัล!</button>`:''}
      ${q.claimed?'<div style="font-size:11px;color:#aaa;margin-top:4px">รับรางวัลแล้ว ✓</div>':''}
    `;
    list.appendChild(div);
  });
}

function claimQuest(id){
  const q=G.quests.find(x=>x.id===id);
  if(!q||q.claimed||q.progress<q.target)return;
  q.claimed=true;
  G.money+=q.reward;
  addExp(q.expReward);
  showNotif(`🎁 รับรางวัล ${fmt(q.reward)}💰!`);
  spawnSparkles();
  updateHUD();renderQuests();scheduleSave();
}

// ===== STATS =====
function renderStats(){
  const totalB=G.zones.reduce((s,z)=>s+z.buildings.length,0);
  const zonesUnlocked=G.zones.filter(z=>z.unlocked).length;
  document.getElementById('statsinfo').innerHTML=`
    🏙️ โซนที่ปลดล็อค: ${zonesUnlocked}/3<br>
    🏗️ อาคารทั้งหมด: ${totalB}<br>
    💰 รายได้/วินาที: ${fmt(G.ips)}<br>
    📊 รายได้สะสม: ${fmt(G.totalEarned)}<br>
    ⭐ เลเวลปัจจุบัน: ${G.level}/100<br>
    📋 ภารกิจสำเร็จ: ${G.quests.filter(q=>q.claimed).length}/${G.quests.length}<br>
    🎯 EXP ถัดไป: ${fmt(G.exp)}/${fmt(G.level<100?expNeeded(G.level):0)}<br>
  `;
}

// ===== TABS =====
function switchTab(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  event.target.classList.add('active');
  if(name==='info')renderStats();
  if(name==='quest')renderQuests();
}

// ===== NOTIF / FX =====
let notifT;
function showNotif(text){
  document.querySelector('.notif')?.remove();
  if(notifT)clearTimeout(notifT);
  const n=document.createElement('div');n.className='notif';n.textContent=text;
  document.body.appendChild(n);notifT=setTimeout(()=>n.remove(),2100);
}

function spawnSparkles(){
  const cx=window.innerWidth/2,cy=window.innerHeight/2;
  for(let i=0;i<10;i++){
    const s=document.createElement('div');s.className='sparkle';
    const a=(i/10)*Math.PI*2,d=60+Math.random()*50;
    s.style.cssText=`left:${cx}px;top:${cy}px;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;animation-delay:${Math.random()*0.3}s`;
    s.textContent=['⭐','✨','💫','🌟'][Math.floor(Math.random()*4)];
    document.body.appendChild(s);setTimeout(()=>s.remove(),1200);
  }
}

function sparkAt(el){
  const r=el.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
  for(let i=0;i<6;i++){
    const s=document.createElement('div');s.className='sparkle';
    const a=(i/6)*Math.PI*2,d=40+Math.random()*30;
    s.style.cssText=`left:${cx}px;top:${cy}px;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;`;
    s.textContent=['⭐','✨','💫'][Math.floor(Math.random()*3)];
    document.body.appendChild(s);setTimeout(()=>s.remove(),900);
  }
}

// ===== CLOUDS =====
function spawnCloud(){
  const c=document.createElement('div');c.className='cloud';
  const h=15+Math.random()*25,w=50+Math.random()*90;
  c.style.cssText=`width:${w}px;height:${h}px;top:${3+Math.random()*25}%;animation-duration:${20+Math.random()*25}s;animation-delay:${-Math.random()*25}s;`;
  document.getElementById('sky').appendChild(c);
}
for(let i=0;i<6;i++)spawnCloud();

// ===== GAME TICK =====
function gameTick(){
  const now=Date.now(),dt=(now-G.lastTick)/1000;G.lastTick=now;
  const passive=G.ips*dt*0.25;
  G.money+=passive;G.totalEarned+=passive;
  updateHUD();renderShop();updateQuests();
}

// ===== START =====
function startGame(){
  // Init zone visuals
  switchZone(0);
  // Starter building
  if(G.zones[0].buildings.length===0){
    G.zones[0].buildings.push({type:'farm',level:1});
    G.totalBuilt=1;
  }
  // Start all trucks
  G.zones.forEach((zone,zi)=>zone.buildings.forEach((_,bi)=>startTruck(zi,bi)));
  renderBuildings();renderShop();updateHUD();updateZoneBar();updateQuests();
  setInterval(gameTick,500);
  setInterval(()=>{renderShop();renderBuildings();},1500);
  setInterval(saveGame,30000);
}
</script>
</body>
